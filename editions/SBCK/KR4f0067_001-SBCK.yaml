body:
  text: 武進張惠言景福宮賦代寕壽之內有景福之宮焉粤若聖祖應受多祜奉坤輿於長樂立璇宮而缺華渚錫嘉名以表瑞􅌗景秩以安悆亦越高宗休顯慶成望皇極之斂敷協乾則於泰寕休徵旣僃耄念時勅乃葺寕壽亦曁景福昭純禧於五代推嘉應於好德爾其景福之爲宮也豐隆穹崇岧嶤崔巍結基宇之固護峙游極而高持瀏濫鴻惝瓌瑋博敞流景燿之赫赩配紫微而作􅁚故其規榘二儀沖陰和陽僃物制度昭庸憲章長楹山竪以旅植棟桴虹亘而高驤棼橑狎獵以雲構欒桷離婁而箕張高甍迢遞以弁戴飛櫩岌嶪而翼翔重阿襲沓以龍騫反宇超忽而鳥頏彤采藻飾焜麗將皇綺發組絢葩華柎光納朝曦以霞爛激夕影而電颺旣雕刻之不侈亦儀度之可詳窗軒方開周達洞啟波黎延朗通表達裏爾乃列石􅁚岳逶迤嶢崢靈木秀植芝房挺生周以丹草羅以瓊英芬芳春敷翕習秋榮觀四氣之變化驗時物之生成回羣􅁚於寸眸甄大造於方庭於是六合時雍九有攸序聖皇孜孜靡怠勤恤庶政而求民豫羨公􅀸大夫庶士三揖於乾淸之宮陳典謨考律度萬幾旣理朝儀旣具乃降雕輦回玉鑾爰豫爰遊以考以觀覽庶物之咸若娛天情以盤桓是以福祉總集嘉􅖤畢單僃靈貺之美報得四海之至歡括肅愼之楛矢組西王之玉環然而聖上猶乾乾祇祇夙夜不遑襲松雲之棟牖見堯舜於羮牆於是乎三事常伯鴻生鉅儒或進而稱曰㫺我先皇帝之記景福也申述天命錫福之原在於敬天􅋢民勤政親賢昭示後世勿􅁯勿愆惟我聖皇顧諟昭假曰暘曰雨天符炳章我則勿數斯乃伊耆氏所以則天也蠲租貸賦湛恩㫄洋一夫不獲若納於隍斯乃姬文所以惠鮮也飭吏治求􅀡言稽古憲典綱周目完同符成周立政董官稂莠拔嘉生崇山採林周行是庸方諸重華闢門達聰若然則道㒺隆而不就業㒺圖而不臻重熙景鑠統和天人雖古之定天保樂旣醉何以尚茲五福五代垂億萬葉而允緜也豈不盛哉遂詩之曰於皇時淸世有聖皇天集厥命申之休祥休祥維何本支百世一堂五代景福同紀上天之縡旭卉有徴聖皇茂對其艱其承維福集聖維聖先天侍臣作歌以揆萬年合聽則聖賦以先民有言詢於芻蕘爲韻葢惟聖皇首出庶物闡坤握乾槖宙合以繩準陶萬化于鈞甄信思睿以作聖必人情以爲田四門旣闢參漏是宣謨維颺拜風以臚傳孰市言之爲鄙實淸問所必先崇峻嶽以基壤開滄波而受川稽往篇于管氏發餘論于君臣謂湯武之隆懿猶下聽于齊民民言則愚民志則神得失互濟可否相循聽不以耳而以意合不于類而于倫雖愚夫之自臆與聖者而爲鄰原夫民也者品庶每生宕冥自蔀見不出于米鹽知不齊于瓶瓿維各抒其湮鬱諒無擇于好莠等唱喁于物籟待壎篪于天牖五方不一其殊嗜六律難調夫眾口苟別聽而偏徇猶道謀而株守縱千慮而一得豈左宐而右有若乃大知鑒物好察邇言達四聰于垂黈納五氣于臨軒會之以大化之宇歸之以皇極之門宅之以禮義之府和之以道德之藩譬五金在沙而納昆吾之冶百潦含垢而注崑崙之源斯其聽之也博而其合之也渾論雖采于輿誦道實成于一尊于是民嵒得民風陳民情達民隱申定國是之猶豫決廷策之逡巡令先甲而如水物由庚而共春信我猷之遠吿儼彥聖之爰詢殊躗言之可棄異蓬問之不賓何愚智之懸絕乃同獨之非鈞是知端神于兩筮妙于初理同于合聽集于虛旣無乖于好惡乃弗辨于咎譽星有從于箕畢䥘取厲夫璠璵故歸聖于上而君弗有歸聖于下而民弗居惟以情繫情而允協斯以聖成聖而相於况乎帝民皞皞皇世于于不識知以順則無偏黨而旋樞聽之則謠興于壤合之而尊酌于衢然而聖人方扣音于寂察響于無表華平于交木懼金玉于生芻葢聽存乎巷議之外合卽爲宥密之符是以一人不自有其聖而萬物乃退處于愚則維我皇上文思是則禮樂爲昭率邇者飫其聲律企逖者動若風簫顧乃孜孜焉旌􅀡議覽風謠慮怨咨于祁暑廣學問于芻蕘于以靖民度于駴豕齊物論于鳴蜩斯至聖之神化不啻鑄舜而陶堯者哉周生字說代周生愷字營道恒字信道余吿之曰夫愷者得非樂之謂耶恒者得非久之謂耶傳曰有德則樂樂則能久樂與久者成德之效非入道之方也夫茍不得其所從入而胡以營之而信之哉乃更愷字曰仲禮恒曰叔夤凡耳目口鼻四支之欲接於吾者皆可樂樂接於外則姚佚變慹感慍恐患之故環動于內故凡世之所謂樂者皆適足以自苦其心者也君子則不然㫺者顏子一簞食一瓢飮不改其樂彼其所樂者克己復禮也非禮勿視非禮勿聽非禮勿言非禮勿動自常人視之其苦至甚然而顏子樂之者節文順于外性道安于內也故禮者因人情而逆爲制及其至也獲人情之大常非特心耳耳目口鼻四支皆樂焉是故謂之大順故君子由禮則終身行不危其心傳曰愷以强敎之禮者人之至敎道在勉强而已此之謂也天下不動之物不可以久穀久則蠹器久則敝水久而不流則汙山久無行焉則薉天地日月所以能久者以其動也故曰不息則久雖然夫動者君子之所愼也在易之恒君子以立不易方說者曰君子謂乾三也乾坤交而三不變故立不易方其在乾曰君子以自强不息說者曰君子謂三也當乾之革與時偕行故自强不息由此觀之不息而能久德無盛於乾三者其爻曰君子終日乾乾夕惕若夤无咎夤者敬而危之之辭也乾至三而泰一泰一否若昃之在晝不可以久故君子敬而危之孔子曰知至至之可與幾也言日新也知終終之可與存義也言守道也故曰雖危无咎此三所以不息而久於其道者也然則夤而後能不息不息而後可以恒進德修業其本如此吾謂愷謹于外以和其內如室之有垣焉勿隘勿庳其可以葆也視其所以充之者而已謂恒持于本以達其末如木之有根焉勿拔勿戕其可以植也視其所以培之者而巳無倦齋銘代古之爲治本末有紀旣克厥成唯倦之戒今之爲治事殊古然始也謹爾終則肆焉孰揆其初而輟其繼進而不舎與古爲比人之有心曷云其渝刻銘座㫄以謹昏婾富陽縣修志書吿代方志者古者土訓誦訓所以考方慝詔地求爾雅之士咨於故實以惇勸明行用咸和庶政也是以國家立之著于憲典富陽亦通邑也百二十餘年邑志不具政事興革之紀賢人士君子孝子弟弟貞婦之行無所考此長吏之過亦邑中搢紳者之責也某以虛乏來尹是邦顧唯闕遺弗敢暇逸咨於耉長僉惟某同其有守故記博舊聞者具以吿某某將裒擇焉惟是公出之費所以給筆札案簿不敢私願與縣之樂義惇行者同之輒捐俸以爲倡來者書於左方志例郡縣志之體當用史法不當倣郡國圖經葢國家政治禮樂度法賢臣良士之行具在國史圖經者特史中地理之一門其所詳者山川國邑廣袤道里土地所宐出如此而已又以其餘㫄及今古之蹟人民故族以􅉆詞人學士攟採梗槩故其辭取􅂤而覈體固然也郡縣之志義在蒐討掌故褒揚哲義葢古者外史之流特其體書美而不書惡識大而不遺小至于斟酌故訓推見至隱行善而僃敗其歸一也近世爲志不明此義于山川則侈景物而原委反畧于人物則錄支節而綱目不具于蓺文則摭題詠而著錄不載于政事興革民俗之大則多所缺畧而不周豈國家所以辨地會考文獻以潤澤政治之意哉余與富陽父老修輯志書爰訂正舊例之所不合者條具如左表志紀傳文家之例非史專名此法不具不可以載事舊志例無篇第隨事瑣題非文體也今定圖志表傳爲四目別爲第焉舊志有圖七今存五卷全縣圖第一縣治圖第二儒學圖第三官􅅟圖第四堰壩圖第五圖後宐各附以考縣境當圖山川朱界鄕圖之分不得混標祠廟古蹟之名考詳各鄕里到之數縣治當圖坊邑街巷考詳其數儒學官􅅟屋舎之數具于考興建始末則入志中八景圖俚俗無據星野無庸具圖竝刪去疆土風俗相因乃具班固地理志其著也定風土志第一城池學舎官􅅟舊志亦有類次之爲營建志第二山有脈絡水有源流地利溝洫于是取則舊志惟標名勝失其要矣今以形勢道里爲敘作山川志第三古蹟見于山川隨時附載不另爲篇土貢因于物產治之大者宐自爲篇作方貢志第四賦役規條舊志畧具稅課驛傳其事雖􅂤然民生利病之大者不可不詳舊以關稅附見賦役而郵驛規制缺如今定賦役志第五關郵志第六倉儲者民生之本邑有常平社倉今常平存而社倉久廢爲治者所宐究心作倉儲志第七祠宇寺觀舊志所詳次諸秩祠作祠廟志第八祥異關政治之得失宐次比之作五行志第九邑之文儒有所著述表列目錄著其大恉附以金石文字爲藝文志第十舊志所輯題咏之作例當全刪今別爲一編存之附于志後長吏之官兹土者邑士之仕宦者爲表書之職官表第一仕宦表第二誌人物當作傳專傳合傳各隨其人惟孝義隱逸文學方伎列女釋道名宦流寓或分類標目舊志所列經濟潛德等部槪所不取雁黃殘稾序代余幼好詞章長耽山水􅋢黃山之勝屛弃人事嘯歌其中於茲二十餘年矣顧嘗以爲此山之在天地縕育祕怪自鴻蒙以至李唐遊屐始至迄今又千有餘年雖僊靈棲眞呼吸升降古有聞者其於淸淑之氣所鬱積怪未有好奇尚異之士踸踔天地排奡日月以追其意之所趨者又未聞有能文章者託焉奇詭跳盪以與山水相雄長以余求之于今意者巖穴杳邃怳忽絕滅余尚有未見者耶抑其人遺世外名雖見之不可得而識雖識之不可得而讀其文者耶閒于寺僧中得雁黃詩刻本一􅁽題曰江城喫雪大涵著而不知其何許人其詩跌宕放縱往往出于懷抱感􅁣不茍爲方外言其于黃山之奇能寓之于性情而發之于筆余讀之恍然如得余向所慕誦者其後徧搜古寺敗簏中復得數卷然後知爲華亭僧喫雪其號好雁宕及黃山故又號雁黃其來黃山在康熙閒居二十餘年乃去詩刻于海寕之相國寺然余訪求其集卒不可得而近今之言詩亦莫知有雁黃者嗚呼以雁黃之于黃山與雁黃之詩之奇其去今未百年之近而泯滅散佚若此然則千餘年來好奇尚異能文章之士棲心此域不幸而無聞於茲者又豈少哉則又疑山靈之􅋢惜珍祕而不欲洩露然則後之好事者將何述焉余故比次所得編爲一帙凡若干卷爲雁黃殘稾序而藏之續有得者將次其後云吳興施氏家譜序代家譜者原葢出于古者公􅀸大夫士家必有史生子三月妻以子見父父名之宰徧吿名于族史書曰某年某月某日某生而藏之藏之葢于宗子之家也宰吿閭史閭史書爲二一藏閭府一獻州史藏諸州府死生登下之孟冬祀司民上于天府小史辨其昭穆之繫以爲世本其庶人工商男女生死不次于小史亦各以名登于州鄕也大夫以上生有爵死有諡太祝則爲之作誄誄者纍列其生平行事以廞諡者也故其子孫將葬旣卜期則以易名請漢以後或自表陳行述謂之行狀上于太史碑表碣志由此作也人臣功次六等銘于王之太常司勳掌之而又予其子孫自銘其彝器傳諸宗廟賢士大夫令孫順子世守先祖之美肅恭前烈無􅁯其章故尼山系本姓之解范匄希不朽之列故國奠其紀家副其藏族世是以不溷三姓有序而四民有處媒氏以擇其世冢人以兆其域周衰史官失職世本之紀終於六國秦燔春秋譜牒亦燼搢紳不識所出故舊皂隸迭相侵冒自學士不能別氏姓其時通人碩儒司馬遷揚雄班固之徒著書自敘遠述世德樂樂其所自生禮不􅁯其本斯固士君子所以追遠反始也東漢之季名氏相高六代中正以爲進退當此之時家譜始作唐時尢盛元和中詔宰相作姓纂每加爵邑則令閱視而唐史表宰相多取私譜之文或頗誕􅄭不經㒺可傳信學者難言夫譜有三統一曰尊祖傳曰君之子稱公子公子之子稱公孫公孫之子以王父爲氏氏則君賜之必賜之氏者所以表族使有統系也其非君賜不得自爲氏所以嚴統也是曰別子爲祖其庶姓若徙他邦爲大夫者則其子孫祖之或賜族也有官族有邑族唯君所賜而繫之以姓以別昏姻以序昭穆以辨嫌疑以定親疎遠邇之序二曰敬宗傳曰宗其繼別子者百世不遷是謂大宗宗其繼高祖者是謂小宗小宗者高祖之適也自高祖以下宗之五世則遷故小宗有四而大宗一大宗者族人祭則吿冠昏之事省焉大夫有賜則以歸也雖去國三世猶反吿于宗後不敢專祖也其小宗之支于其小宗如其于大宗大宗死族人爲之齊衰三月勿敢降宗也者尊也與祖爲體以尊祖故尊宗此以下治子孫三曰收族禮繼別之宗得立別子之廟爲大祖不遷宗子與族食族燕世降也而弗殊五世爲族以五爲九族昆弟之子相謂爲親同姓服屬單矣猶親之也親相養屬相服世相祭宗相恤嘉會相慶喪相哭也故曰宗以族得民是故水木之本非譜不明支嫡之紀非譜不敘孝友任穆之義非譜不增厥思族之敬恭者以祖澤相訓也惰窳者有所愧而懲矣易曰食舊德貞是謂三善三善不立則三弊興原系不審苟託名望是謂誣祖世紀乖舛派縷無列是謂疵宗美惡不實褒稱失倫是謂偸族善之與弊其端少離其末千里可無愼歟施氏吳興望族也其先出魯惠公以字爲族具見世本臨濮侯以聖門弟子故施氏六藝傳其家其家譜倣作于宋閱數百年某者余門下士也學京師攜之來校正舊義例之未善者定爲若干卷余嘉其不骩于俗之所爲而志于古賢士大夫合族之遺意也故具以所聞者語之遂著之􅂤端亦使後之人考覽焉贈楊子掞序代某曩在京師與子掞共學於張先生先生數言子掞可與適道先生旣歸而某與子掞交益親愈悉其性情志氣相砥以學問然子掞嘗自言自吾聞仁義之說心好焉旣讀書則思自進于文詞然欲竟其業則若有鬼神異物陰來敗之于爲人也亦然其使吾忽然而生不肖之心乖沴之氣類有迫之者如何􅁘某謂子掞人之生一心而能與萬物抗者志是也志茍定矣其於憂戚忻樂之生如四時寒暑之代序曾何以滑於中子掞之患唯不能平其心理其氣以自進于仁義之路過此非子掞所患也子掞則以某言爲然未一年余別子掞而南其冬子掞奉其太夫人命就婚湖北過訪某于富陽先生在焉閒以子掞之所患某之所以開子掞者質之先生先生欣然喜謂二子者之言近於道也先生乃言曰義利者人心之所兩有也君子之爲義有時而利皆以義取之小人之爲利有時而義皆以利要之主其所從入則後起者爲客此君子小人所以百變而不淆也人之心閒而無所事不能無思閒而有思則怠傲姚佚之慮十常八九故君子居則有習息則有游常以其心委之聖賢之訓使不失所倚則成之若性然至事勢之交於前而鰓鰓然方將平其心理其氣是非樊然而胡以相擇況能自勝耶夫君子出其言則思文其行日爲君子之言而欲爲小人之事其情將有所愧報而不敢故文辭非君子所尚也及其求道則文辭之功亦不可廢也又曰禮者情之檢也敬者志之門也勤者氣之將也改過者德之地也君子行此四者則幾於道矣某旣得聞此言也退而識之書以贈子掞且以自警焉江寕戴氏祠堂壁記代古者公􅀸大夫士有宗法以族屬其子孫民各世其業安其禮雖去國三世吉凶之問皆反吿故其服習舊德也深其相繫也固用能保世以滋大先王之澤旣息民始離散分析兄弟親戚或掉臂而不能顧搢紳之世高曾之名氏不能舉者往往而是也于今之俗有能敦念祖考敬龔祭祀以裒戢其族人者在江以南唯徽州之風爲多以余所知其民有葆晉世之墳墓者其居多聚族族必有宗祠歲時之祭饋獻之儀往往有古禮其支分徙他處者亦愼行其故俗葢其地僻其土瘠無兵燹之禍無靡華之產共民孅儉敦本先儒程子朱子之敎澤猶有存者然必有好善之士施德於一郷躬飭行義以訓于子孫亦世有繼之故其傳之久者其積也必厚理固然也戴氏徽州休寕之望也明初有萬二萬三者賈江淮閒萬三定居揚州而萬二居應天應天今之江寕府也揚州之戴在明世世衰入本朝益落流轉而居江西之大庾再傳而太僕第元起其家太僕之弟今京畿御史均元及太僕之子編修心亨今庶子衢亨竝時以科第顯爲世聞家而江寕之戴二字缺時有谷安者以家財三賑七縣之饑賜冠帶號義民祠賢良其後宏治中有睿者九世同居賜太常博士旌義門其孫十三支至今數千人蔚然與休寕大庾爲三望雖未得顯仕爲善之報何其長也余之舉于鄕出庶子門下坤五者江寕之裔於庶子爲子行歲甲辰余從庶子于山西學政官􅃕識其人敦厚明敏爲庶子所器今年余宰富陽坤五過余因得盡聞其世德坤五請余記之曰將爲訓於族人余謂坤五君之祖爲善於鄕丕顯有耀以蕃其子孫君能稱述先德式訓於後用嗣前載可謂反本泝源知德之要者也江寕之族世昌世顯吾於坤五焉卜之遂書以爲江寕戴氏祠堂壁記高氏義冢記代昔者先王之民生有所養死有所葬然蜡氏掌除道路之㱴孟春之令掩骼埋胔何者弔天災敎人義儆救政也維富陽瀕漸江下流循江諸山暴水時出當其所激汓棺漂屍汨乎隨流經富陽之城而東則委大墟若脫笴焉在乾隆某年某縣水知縣某募人並江以須收棺若屍􅄟之東郊後幾年徽州之祁門水知縣某亦如之所收逾多於是縣人高氏入其私地之在東郊者以爲義冢今年余來尹是縣夏五月水發衢州令曰無怙災無棄善縣之士民踴躍奔趨凡幾日得若干柩死人若干棺之并􅄟於高氏之義冢余旣嘉縣人之好義死者之幸弗委骨而義冢無標揭懼後失其故且無繼也迺伐石而記之後有來者得以勸焉凡義冢東西若干步南北若干步已葬者若干步凡若干冢高氏名某字某康母孫太夫人六十壽序嘗讀易漸之上九曰鴻漸於陸其羽可用爲儀解之者曰漸女卦也上高位也順艮之言謹巽之命履坎之通據离之耀婦德旣成母敎又明有德而可受有儀而可􅁚故曰其羽可用爲儀聖人繫易明婦道之爲儀而詩曰無非無儀者何哉婦人之事在閨門日用之細而其效在父子昆弟之閒其事細故不敢以善自見家人之六二曰无攸遂在中饋是也其效鉅故觀其澤之所漸有以知其內德之􅌗而以昌其世隨之九五曰孚於嘉是也漸之貞山也其悔風也風行而著乎山故曰女歸坎夫也离婦也艮子也巽母也上之應三也爲夫爲子其卦四也爲母爲妻夫正而婦順子成而母從鳥之有羽也從乎其翼而翼非羽弗飛也婦之爲道也從乎夫從乎子而夫非婦弗成子非母弗訓也艮爲陸离爲鳥故曰鴻漸於陸居鳥上而上乎風故曰其羽可用爲儀言其家人則之而世又謌詠之也康母孫太夫人以名家女歸少司馬􅌗園先生事姑以孝相夫以禮持家以儉御下以仁信乎其順而謹也撫其所生以及其猶子􅋢之鈞敎之鈞焉以有成信乎其能通而明也太夫人從司馬官江南惠言未獲拜于其堂然數與其諸子遊觀其亮􅀡恂謹動有禮法固茂園先生之家訓而秉於太夫人者尤深澤旣型矣世旣昌矣然則太夫人之爲儀其明著大效矣哉古者國史傳列女以著閫則成王道也後世不察以才華奇節當之而庸德不及焉夫才華奇節詩人之所爲儀庸德者易之所謂儀也若褒顯婦德母敎如太夫人者以垂陰敎振世範其庶幾乎十一月日爲太夫人六十壽辰年家諸子謀所以介觴惠言爲說易之爲儀者序之夫稱誦名德以厲世翼敎吾黨之責也若夫尋常祝嘏之頌介福之辭非所以聞於太夫人也徐􅂤齋壽序曩鄭先生夢楊爲余言乾隆乙巳丙午常州大饑太守金公勸富民出粟以賑設局於東門之外擇邑中賢者董之一時搢紳士民無不竭力助太守養百姓而簡齋徐君爲賢君東鄕呂墅人徐氏聚族居以百數其貧待賑者鄕長旣冊報君取公冊自出貲私給之如數並及莊南李氏數十家李氏徐世姻也局日與饑者粥人一盂食者不飽君糾同志糜麥屑益之人藉以活先是夏六月不雨君輒赴荆溪山中購薪積數百萬束或問何爲歎曰陰雨而徹桑土豈有及􅁘巳而賑局設薪苦乏皆資於君人多君之仁而服君見事之豫也俄而君遘疾殆甚寤夢中恒喃喃語時嗟歎聽之皆與饑民問訊聲也一夕夢神語之曰爾有隱德當延算第無憂疾寤而釋然病良已余聞而悚然因果之說儒者所不道而積善獲福之理則天道之可信者夫爲善者茍有果報之說於其胷中則其爲善也必不誠茍誠矣必不求其報而其善氣之所涵煦自有以引其澤於子孫而况其身乎君之得福於神非怪也理也以是心慕君恨未得識嘉慶辛酉冬見君子世楠於京師文而有容溫溫儒者氣人咸謂君有子將昌其門則余曩者之言爲不􅄭矣世楠言君遊山左時聞父疾不及束裝晝夜步行百餘里八日而抵家父適思乾脯君急􅉆之巳不能食自是見脯輒泣下遂不御肉至今數十年君年五十後盡擯塵務手校敬信錄輯最樂新編刻之與人子言孝與人弟言悌推其心惟恐一日之善不及於人而接於我者一人之不化於善則其心引以爲大歉也夫以因果而爲善豈君子所弗許哉然而所以辨其誠不誠者無他焉不􅋢其親而􅋢他人者謂之悖德不樂人善而自多其功者謂之悖施故君之生平施予事甚多而余獨於世楠此言知君之能誠於中也世楠又言君之配葉夫人孝於其姑姑嘗折傷右肱盥􅎳唾涕撫摩抑搔夫人以身體之無不如志夜不交睫者數月姑中夜偶寤思起甫轉側夫人之手已承肩背矣姑忻然曰乃如是􅁘每一飯必怡顏曰吾飮食無嗜好惟新婦所進覺不僅悅我口也葢君之善行於家而有以成之又如是於是世楠曰明年壬戌吾父年七十有一而吾母七十三正月六日及二月五日爲其生辰欲乞子一言爲壽可乎余以爲古之爲壽者主於稱德勸美以介純嘏巳耳不必其在生日也而况必於十年之期乎唐人之慶開秩也恒以十一之歲子之親又適當其時余其可以無言雖然夫稱人之德頌人之美將以發潛德爲世勸也夫構浮說以祝其人之永年而其言無所立者余弗敢道也故述曩所聞及所論於君者以序之世楠以吾言壽其親其亦有當於君之爲善之意乎茗柯文補編卷上􅋢石圖賦幷說擬庾子山七夕賦文質論吏難一吏難二吏難三答尸問附與孫􅘢如書客招鄭濮州遺像贊書劉海峯文集後跋鄧石如八分書後書山東河工事與金先生論保甲事例書記族弟平甫語呈座主阮侍郞答呉仲倫論文質書與錢魯斯書與陳扶雅書茗柯文補編卷上武進張惠言􅋢石圖賦幷說性者五行之精也故常寓於物物茍寓性則情應之􅋢者情之動而近性者也故􅋢之於物也喜新之怒申之欲始之哀樂終之得之終身不得終身杳默不卽而與之兩行􅋢之之於物也飾之不以爲采質之不以爲樸瑰之不以爲異􅋢之於物也纖之豪不見其少合之宙不見其大漻乎天不見其廓紛乎百育不見其侈㫄礴而獨行也與身爲儀羿之見無非矢也扁之見無非輪也伯倫之見無非酒也性也王君某􅋢石余嘗過其居無石也獨一圖畫其貌偶石而居王君之於石也殆見以性乎性者德也王君其德於石乎夫山之爲物也雲而上澤而下宣湮鬱發滋澍施天下而不德焉山石之積也玉之爲物也六氣遂九德僃特達以爲寶玉發於石者也王君將種其積華其發而山乎而玉乎抑磐如介如而將确确而將確確乎王君其可以勉矣乃爲之說以遺之又從而賦之賦曰有物於此生於山阜遍於大宇莫知其成莫測其度圓不中規方不中矩縝密以理䚡乎何其君子也寕謐而不徙莊莊乎何其士也洸洸乎不屈以確何其志也徧用於諸生而無爲焉優優乎何其道也峩峩以上人而卑之何其德也崇嶽得之是謂氣均列宿得之是謂燿辰赤松得之是葆列僊宏成得之是長儒宗王子再拜服爾不渝請誦德音載之畫圖曰此夫土之格而氣之核者與一輝一光而不以文章者與致堅而貞而􅄱不一成者與致靜而一而居不爲跡者與磨之不加瑩而雕之不加飾者與人皆瓊瓊我獨落落人皆嶤嶤我獨礐礐人取其華我取其樸發之以爲珍予因以爲佩也捐之以爲芳予因以爲塊也夫是之謂石之介擬庾子山七夕賦昭陽殿裏不知秋祗言涼入卷衣樓舊拭蛾眉嫌月闊新添綺縠學雲浮定是天河西北注不隔雙星來去游於是窗開􅀡漢簾挂通霄九龍遲下三鳥先要出蘭宮而名燕入金屋而稱嬌香雖薰而不坐妝到晚而新撩一笑初來雙攜共迴月窺影過風礙衣回凝裾齊拜移祑初開鍼是同心之金縷綫乃雙蘇之玉蕤刺鴛鴦而纔罷繡夫容而未裁就暗雙拈臨風微背鼻細難眞絲長易帶因忍笑而􅁫搖乍低頭而鬟礙夜久添衣明鏡前還將巧笑得人憐􅀡道年年待烏鵲懸勝夜夜倚瓊文質論質之不得不變而文也勢也文之不得不變而質也亦勢也勢之所成因而通之天下於是不勌勢之所極矯而張之天下於是不窮傳曰帝王一質一文法天地之道也文質再而易正朔三而改又曰先王立三敎忠敬文是也夏敎忠殷敎敬周敎文由是言之虞質而夏文殷質而周文夏周之文同而所以敎異周繼亂而夏繼治也夫民情者不能常平聖王之制必自其所不平而入一代之興必更制度作禮樂移風易俗非有所明著其敎則上下不可以相喩而化不興俗不成故主文主質者非道之中也所由適於禮樂之路也天下之勢盛則流流則窮窮則思反當其盛也天下知其適不知其敝也聖人從而通其變潛移默率而使之不流故可以長久夏之繼虞是也五帝之治皆此道也及其旣窮也天下卒卒焉苦之而不知所歸聖人挈其勢而振之故一旦盡反而從我殷周是也後有作者百世可知也故聖人近生則文質百年而一易遠則數百年千年必得聖人而後能易然其相代之勢則未嘗改也衣之於裘葛食之於和味舟車宮室器械之用世更世變要於其便而止此所以生人者非所以爲文質也文質者又非奢儉之謂也文質者其要在父子君臣之序六親上下之施其事正於坐立拜跪裼襲差殺升降之際而出入於性情之閒質之敝也民之喜怒好惡肆然而自遂雖置之琴瑟羽籥之側習之俛仰揖讓其自遂者自若也文之敝也天下務飾其具機巧詐僞相冒散然而無以相屬雖去其所以自飾者而猶不得所屬也故文者作其不容已之情而已質者反其不容僞之誠而已情不容已故手足耳目皆有所曲而致誠不容僞故周旋進反皆有所麗而存是故文質之爲禮猶麴櫱之爲酒也聖人合文質於禮而輕重之以爲敎猶酒人之輕重其麴糱口爲齊也五帝三代以來聖人之所以爲文爲質者後世不察也學者徒見周之後無聖人以反之質因以爲質之趨文如江河之下而不可挽嗚呼惑矣夫自周以來天下之勢未嘗一日不欲反於質特無聖人爲之道爾今夫蔬菜之味常不足以勝粱肉也然至飫珍腴之饌飽羶香之膳未嘗不思蔬菜也周之衰天下相瀆以文而先王所以治天下者皆足以亂天下故其强者不勝其憤而決然破壞之齊之以一切之術申商是也其禍起於民之敝於文也當此之時聖人不作憂世之士目見其敝之至此而無以善之故莊周列禦寇之徒造爲虛無淸靜之道盡去其委曲繁重之法而歸於自然至於佛氏之敎出遂幷其父子君臣而皆去之而天下翕然樂其說夫老佛之說其􅂽遠詭怪豈遂足以愚天下而天下樂之者足以見民之病於文而思反也葢逃空虛者見其似人者而喜矣民思反質而不得其道則見其矯於文者而樂之其勢然也歴觀漢唐以後得天下者莫不崇簡易尚惇樸而無以成其敎則民俗不變治亦不長葢民之欲反質之勢千有餘歲而未嘗改而迄不得聖人爲之遂壞亂而不救使異端得以乘其􅂩可􅁣也後世之民日益苟簡起立拜跪周旋裼襲之數僅有存者質旣盡喪而復相與自去其文治天下者得不早爲之所哉吏難一古之吏難乎今之吏難乎古者民食君之食而衣君之衣服君之敎而事君之事生齒以往至於老死皆有以給之人民車輦馬牛六畜皆得以數計故其民有貧富而無凍餒而其爲州黨之吏者其始皆與其民輩作輩學其德行道藝爲眾所興也而還以長其鄕里故眾服以聽其所治上者五百家降是乃百家以下至五家而止其人習故不察而悉其事􅂤故不勞而詳當其時吏奉法守條敎而天下治後世之吏則不然出五百里乃聽仕宦南人使之治北山人使之治澤其土俗固非素悉也州縣大者數百里小者乃百里戶口以萬計簿書案牘出入之擾强者弗能勝也送迎之煩􅉆億之禮舟車㕑傳之費廉者弗能節也民富者貧者安居者轉徙而流亾者吏不肖不知其何以然也賢者知之矣然而不可如何何則耕無以爲之田賈無以爲之貲居無以爲之宅稟而粟之則無以食之迫而抑之則亂故不得不聽其貧而轉徙以至於流亾不幸而有盜賊水旱之患雖貰其租寛其賦日賑而月貸之民之死生固不可知也幸而水旱不吿盜賊不發租稅以時入徭役以期辦上下相慶以爲太平而顚窮之民父儥其子夫鬻其妻爲臧獲奴婢以自存者吏不得而知也失業無吿槁項以死塡委於溝洫者吏不得而知也饑寒之不忍起而爲竊盜矯虔無行以入於􅆿僇枕首死者吏不得而知也然則吏無虐無墨無失法而民之死者已不可勝數矣嗚呼今之吏而欲古之治其亦難矣夫民賴上之力以生其生以長其子孫自食其力之所出而以其餘奉上以相養故尊其君而親其長無事則長安有事則可用今也民自以其力養生營死以自幸脫饑寒死亾之患而未必可得而又損其所以自養者以給君長奉期約吏有求焉號囂而令之帖帖若奴隸錙銖而算之充充若外府然而有以窮困吿者庸吏作色賢吏蹙齃卒莫起而爲之籌若是而求民戴其上不可得也愚以爲方今之患獨患吏與民闊而不相親民之視吏也憚然若神鬼之不可卽吏之視民也芸然若履崇山而視原隰之草木無所別之民之疾痛顚連而瀕於死者有執途人而哀之者矣未有號呼求拯於州縣者也其愚者不知州縣之職宜生我也其知者知號呼之無益也且不惟無益而已州縣出一令行一法傳呼者數十人奔走者數百人利未見而已受其害故賢士大夫多以爲戒而民亦願相與休息而無爲夫立法而不便者上不悉下也法便而民不勸行者下不信上也今夫良將領百萬之眾雖竈下厮養莫不知其所爲而士卒亦莫不與其將同腹心幷耳目者非能日偵伺而人撫循也審於其利達於其害法度明而誠信著也故茍有以相親則百萬之眾措之若指臂茍無以相親則內治一妾外馭一僕且不足審其旦莫所事而何以謀長乎里有正圖有保是古之閭胥酇長也宜擇士人有行者爲之誠能略仿周官管子之意立之敎法使各掌其治以時課而問焉暇則與之論利害省謠俗閭閻幽隱之故必可知也令有謀焉則修之鄕鄕以修之都都以修之圖千里之遠可使猶一家也上有以知其下故舉而不過下有以信其上故令而不啎然則生民之政舉而措之可也吏難二夫吏誠有以信於下而有志於生其民則必無狃於目前旦夕之安而務治其原本今夫古之所謂休息而無爲者不爲矯絕之法不立佹俗之制不咈乎民心以求譽如此而巳非謂泛泛焉任其自生自死自榮自悴於其下而我不與知乃曰上與民不相擾也若夫管仲之治齊子產之治鄭孟子之治滕矯然一變其故綱立紀具朞月之閒犂然也故三子之治可謂究其本矣非之而不懼沮之而不撓及其經制旣定上下宴然子孫􅀩業數十百年而可以無壞然則休息無爲未有大於此者也今之賢吏曰寬徭役謹賦稅去其盜賊而理其獄訟則民安而治得是則然矣然而其所及者樂業之民也若其失業者雖有寬徭恤役之令而彼無與也饑寒之不恤則所謂盜賊者皆此人矣吏見其盜賊也而以爲不足惜嗚呼孰知其始之本未盜賊邪而況有不肯爲盜賊而死者邪夫此失業者果爲惰遊之民雖饑寒以至於死宜也然而民之饑寒者不皆惰遊農之子失其田商之子失其貲工之子失其學加以病痛死喪之故天災人事不可測之患往往罹此有司者奈何以盜賊棄之哉夫天下之地皆足以衣食天下之民而利之所出不均故得其源者生而失其源者死且夫一人之利而二人資之則微十人之利而百人資之則匱今民之所以求利者一人得之則千人趨之然則利安得不絀而民安得不貧是故欲民之無饑寒莫若均利源欲利源之均莫若正民業管子曰聖王定民之居成民之事四民者勿使雜處故敎有恒而事有攷葢古者度地居民而頒執事其要如此今計一縣之中田上下之率給幾何人山澤所出給幾何人四方貨賄市井之贏息所食者幾何人䌛俗所資技藝工匠之巧須幾人也磽瘠之可化者幾何草木水石之未取者幾何四圻之內都㑹者何所鄕里市肆之不當其所者幾何行資四方而不棄其鄕里者幾何人通游者何所利矣總其數而乘除之必使所業與利相當而劑其有餘不足其農之能盡地力者工之能立物利者商之能裕本計者所在以吿吏發幣聘之建以爲師使長其曹輩而敎其不及稽其怠惰者不任者斥之農聚於疆工聚於肆賈聚於市田而不能播耰者不容於疆藝而不能飭材者不容於肆貿遷而不能阜通者不容於市其無田而無資者使相假貸而時其出入男年十六而不業業女年十三而不治絲枲者罰其父母則民勸其業而利修其有饑寒者或寡矣或曰管子之法四民各處其所今民之雜處久矣亦將分之乎否乎曰夫分民者非奪其居而徙其鄕也百室之聚必有市有肆有民居之􅒡其爲賈者必就市而工者必就肆其常也吾因其宜而安集之使其不至哤雜而已何難焉曰民旣習其業矣利不足又使其他習如之何曰非徙已習之業也禁其方欲習者而已夫習焉而不獲其利茍願有徙者而吾有以安之而又有以敎之則彼亦樂得其所矣今夫一家之中有操作者有厮役者有芻圉者其爲之者皆其人之所自欲也而分處其所爲者則主伯之事也今一邑之民爲士者爲農若工賈者問吏以其數而􅃼然而不知也嗚呼僕隸無經事而主伯且得有其家者哉吏難三凡人之情莫不自私其身莫不自利其家夫茍自私其身而自利其家則宗族親戚與夫塗之人其非吾之身吾之家一也先王從而敎之曰服屬相存昏婣相收主友相恤鄰里相賙疾痛顚連鰥寡孤獨者相養而民莫敢自私自利者果何以得此於民哉夫有所甚私而有時出以爲人彼其心必有所不忍也有所甚利而有時分以予人彼其義必有所難已也聖人者作其情而用其恥故能使相救猶一身而相􅋢猶一家則禮之效也今夫同父之子茍非大不肖未有不相親者也子之子而爲孫則相親者寡矣以訖乎孫之孫則相親者十無一二焉何也其情漸遠也彼其少時習見其父之所親者上則祖也㫄則伯叔父也從父之子而父之視之疏矣從祖之父而父之視之疏矣則日衰日別而至於塗人其勢然也至於朋友鄕里其始本塗人也以塗人目之而欲以聯其恩不可得也禮於其本親幼則同居長則同宗墳墓相族昭穆相次冠昏喪祭相凶吉於其儕偶出人相友守望相助疾病相扶持居則相保相受有罪奇衺則相及夫疏遠之甚雖兄弟夫婦有時而􅁯暱邇之甚則握手之人皆肺腑也此之謂作其情夫人口甘酒醴而身樂黼繡體便宮室輿馬先王之禮曰庶人雖富不得衣絲帛乘車馬宮室高下皆有數制惟有德行者則賜之章服豈􅀡以禁民之奢哉賞罰者上所以激勸天下之方也今使富民巨賈罔百姓之利而皆得以其財赫然自恣其耳目之華則民莫不沒身以自致其赫然者矣使其雖有可致之力而不得以自恣而有孝弟睦婣任䘏之行者上以是赫然高異之則彼富厚之民求快其百目之華者孰不自力於孝友睦婣任䘏之行哉旣以是勸之矣而又設爲不孝不弟不睦不婣不任不䘏之􅆿歲時讀法而以糾之夫進則有榮而退則有僇民宜何從焉此之謂用其耻今吏之所以敎其民者何也一縣之中父子兄弟親戚之相吿者歲有之矣白晝大都剽奪而賊殺者時有之矣作慝犯令撟僞而詐㒺者月有之矣夫人至父子兄弟相賊不畏王章不顧吏法此其風俗至可傷悼也而吏不之怪其好文學者進其士而校課之程之以科舉之文而敎之以速化之術則以爲化導風俗之具無出於此嗚呼上之所以敎者如此民之嗜利而無耻豈足道哉愚以爲方今之勢敎民之要有五一曰立宗法二曰聯什伍三曰聯師儒四曰講喪祭之法五曰謹章服之别夫此五者非甚難行也知及之難仁率之難然而欲以移風易俗舍此無由也夫聚一邑之民而貧者資之鰥寡老病者養之雖聖人有所不能給五者之敎行而偝死􅁯生之風革惇厖純固之俗成民有以相養而無以相棄上不費而惠遍則三代之治不是過也答尸問附與孫􅘢如書􅘢如足下辱下詢以古祭立尸雖非先王之精意然治經者不可以就求其所以然師說紛如孰可采據惠言少讀記傳竊嘗反覆於心臆擬其義作答問一首其後恭讀御製文公尸說乃始戄然知小儒偶識無足當制作大義廢棄不存久矣今輒檢錄奉呈足下察爝火之息則益知太陽之所爥鉅也或問曰尸􅁚神信乎答之曰非也神不可􅁚􅁚非神也君子三日齊見其所爲齊者僾然見乎其位肅然聞乎其容聲而豈尸之􅁚哉尸也者必從主主出於堂則尸在堂主入於室則尸在室以尸之未嘗離主也非尸之􅁚神也然則立尸者何也日爲行禮也一獻之禮必有獻有酢有酬祭也者禮之至大也神不能與人爲禮則禮不成故假之尸也事死如事生父子君臣男女行禮無不酬酢者立之主干上而獨拜其下漠漠然無知也以是爲之死故假之尸也祭者於彼乎於此乎故博求諸陰陽奠於主鬼道也饋於主於尸人道也合鬼與人敬之至也曰然則神可假乎曰王灌諸侯則宗伯攝燕其臣則宰夫爲主人人偶之尊不敵卑也胡爲不可假也然則其取佋穆何也曰神屬也孫附於祖則同廟有相代之義也祭墓以冢人勝國之社以士師官屬也其餘外神無常尸卜擇異姓無適屬也然則其服神服何也曰從尊者同服維王之大常者袞冕送逆郊尸者裘冕以是爲敬也不敢以褻服服之故用祧之藏衣也喪之未虞也四時之釋奠也殤之厭也不僃禮無尸也無祿者稷饋稷饋者無尸無尸則其禮如何曰虞無尸則陰厭而已吉祭主人自酢獻賓舉酬餕改饌陽厭可也虞無尸則祭亦有無尸其禮如何曰奠可也聘禮還吿禰三獻也薦脯醢觴酒陳席於阼三獻輒酌主人酢一人舉爵行酬無過是矣問者曰尸者以父拜子可乎曰非子也古者父在不爲尸非子則可拜乎曰拜者所以爲禮也非尊卑之節也適子之喪父主之適孫之喪祖主之主喪者必祭是父固以拜其子而祖固以拜其孫子冠見母母拜之大夫見君君拜之無避也父在不爲尸者避尊位也非避父之拜也問者曰子言父子相酢於禮何也曰特牲饋食嗣子䉵主酳䉵拜受卒爵洗酌酢是也主人拜祝拜酳拜受酢故曰拜者以爲禮也非尊卑之節也曰郊祀天而用人禮何也曰祭者人道也客招左仲甫將歸江南愁懣怫鬱傷其才不偶世奔走悵网故依楚騷之賦以敘其情詞曰鳴鵙兮喟予蟪蛄號兮夕莽蘭與茝兮滿庭蓀何爲兮車下時瞹瞹兮不畱歲旣宴兮不可􅊃迷陽兮迷陽荆以棘兮紛道周硉兮崛屵兮嶏石齒峉峉兮􅈏􅈏水漻繆兮無徛風中流兮汨之客眐眐兮私自憐經營九區兮側一身卉卉兮汀洲予何搴兮杜蘅撰轡兮高逝路之錯兮多異南覿兮幽陵北何遻兮丹澨有鳥兮翻飛毛羽兮摧摧鳴聲兮嚌嚌翕翮兮拊翼爲佳人兮長太息太息兮忡忡願猋舉兮雲中浮雲兮千滅四海兮多烈風應龍兮䕫夔鱗翼兮世所疑腰褭兮倛首駑之相兮駴之歲宴兮不自􅊃憑枳薄兮求匹儔幽林晻兮不見陽左蠽蠿兮右蟷蠰驚麇兮未息白鹿饑兮翔羊慕類兮以悲黃鶴遠舉兮睨予鳳皇兮不來焉洋洋兮㒺薄私迢悵兮莫知逵夷兮􅠆􅠆蕩蕩兮無人飄風兮先予埃坲兮曠野湫以攸哀以愁握佩玖兮中路奚所詒兮九州客子兮歸來貧賤兮不可以遠游鄭濮州遺像贊􅄌谿鄭滿字守謙宏治壬子舉人爲濮州知州致仕孝廉方正勳十二世祖鄭有世德吾見其孫我圖璠璵奐如爾溫世德維何吾聞其祖堂堂濮州政化齊魯君子之澤五世而遷懿惟鄭宗載緜載延秦川之後大於高州南谿詘齋永言作求弗人亹亹億艱其孝集於書常孝思是考理學爲儒迺宗迺缺猗歟濮州宗朱祖程是傳其家永世克紹蕺山棃州是蒐是討學曰貽之德曰維之允惟鄭宗胡不禕之濮州之殁垂三百年遺像在圖遺文在編創者不易守之實難孰爲承斯勿隳勿愆人生有本非本胡思凡百君子敬而視之書劉海峯文集後余學爲古文受法於執友王明甫明甫古文法受之其師劉海峯本朝爲古文者十數然推方望溪劉海峯余求海峯文六年然後得而讀之海峯之文有學莊子史記爲之者弗至也學歐陽王介甫爲之時至焉學歸熙甫輒至焉名取遠迹取邇其效然耶後有作者終不得爲莊周司馬之爲耶明甫之言曰海峯治經功半於望溪其文必倍勝於望溪然則海峯爲之而不至焉者果繫於世之遠邇􅁘明甫又言海峯爲古文旣成乃箸籍爲望溪弟子嗚呼兩人故相爲先後哉跋鄧石如八分書後懷寕鄧布衣石如工爲小篆八分乾隆五十年余遇之於歙縣此卷其時所書也余之知爲篆書由識石如石如之書一以古作者爲法其辭闢俗陋廓如也嘗一至京師京師之名能書者爭擯斥之嘿嘿以去海內知重其書者數人而已楊生子掞學爲八分而未識石如特􅋢此卷故以與之凡事得其所從入然後可以决是非爲書且然而況其進焉者歟書山東河工事嘉慶二年河决曹州山東巡撫伊江阿臨塞之伊江阿好佛其客王先生者故僧也曰明心聚徒京師之廣慧寺詿誤士大夫有司杖而逐之蓄髮養妻子伊江阿師事之謹王先生入則以佛家言聳惑巡撫出則招納權賄傾動州縣官吏之奔走巡撫者爭事王先生河工調發薪芻夫役之官非王先生言不用也不稱意張目曰奴敢爾吾撤汝矣其横如此內閣侍讀學士蔣予蒲王先生廣慧寺之徒也以母憂去官遊於山東伊江阿延之幕中相得甚奏請畱視河工有旨許之巡撫擇良日築壇於公館之左僧道士遶壇誦經者數十人巡撫日再至蔣學士王先生從及壇蔣學士北面拜巡撫亦北面拜王先生冠毘盧冠加沙偏袒升壇坐學士巡撫立壇下誦經畢乃去如是者數月河屢塞輒復决其明年正月王先生曰隄所以不固是其下有孼龍吾以法鎮之某日當合龍速具掃巡撫曰諾先期一日掃具役夫數百人維掃以須巡撫至王先生佛衣冠手鐵長數寸臨决處唄音誦經呪良久投鐵於河又誦又投三投舉手賀曰龍鎭矣巡撫合掌曰如先生言明日水大甚巡撫命下掃眾皆諫不許掃下數百人皆死居數日王先生又至投鐵者又三掃又下死者又數百人隄卒不合張惠言曰余居江南輒聞山東河工事未審及來京師雜詢之多目擊者嗚呼佛氏之中人至此極哉書其事使來者有所儆焉王先生旣蓄髮名樹勳以資入待選通判本揚州人或曰常州之宜興人當其爲僧時故有妻子也僧號嘿然嘿然者亦其未爲僧時號伊江阿謫戍伊犂王先生送之戍所聞其將歸謁選云與金先生論保甲事例書日昨承諭令擬定十家牌式務令􅂤而易行不􅂤不易民莫之與此誠立政立事之大綱也然謂無須監督冊報但使十家保受而已區區之心竊有未諭反覆思之夜以繼日誠見其未然惠言聞古聖王之治天下至纖至悉其舉一事至周至密故其民從之如日用飮食之不可廢何者受其利而遠其害也由此言之其下之奉之也􅂤其在上有繁焉者矣其事之行之也易其發慮有難焉者矣故君子立一事興一敎必有數十百年之計貴其後世可守也王文成十家牌法所以不監督冊報者以其時强寇在邇各有戒心其勢固不須上之監督冊報也今以無事之時爲迂遠之僃愚夫見邇豈肯盡心且今州縣歲歲所行門牌戸册卽是文成遺法其牌冊固以十家爲聯但少挨查一牌耳然今日之門牌何曾有稽查之用今增此一牌不過以保長之責分之鄰里其稽查與否不識與門牌何以異此知其無益者一也窩藏姦匪鄰里不首律有明科然娼賊窩家處處而有鄰里爲株累者亦不少然未嘗問者發之而不勝則立受其禍發之而幸勝則徐受其害故隱忍而不問也今徒以一牌之文編連曉喻欲其檢察無隱固已甚難卽使檢察得實吿之官則干涉公廷爲累不小吿之保長則保長未必不狥庇吿之本鄕紳士則彼不任其責誰肯力爲主持然則莫能以他日不可必之連坐而博目前不可解之深怨也决矣此知其無益者二也如其鄕里無事此牌實爲具文有之可也無之亦可也不幸一旦有事倉卒之閒依牌集眾十家之中肯同力乎其視紳士十家之一而已無督率之責能聽其指揮號召乎然則有此牌與無此牌相去幾何此知其無益者三也非特無益而已又有不可者七將定十家門牌必造煙戶淸冊現在各鄕保長已議照田起派矣至於十家門牌又必逐月領給上司旣有來文州縣必須月報州縣旣行編審書吏必責繳牌是月有所費歲有所糜無冊報之實而有冊報之費其不可一也編審一定牌頭之名注在縣冊嗣後十家倘有官事保長必株連牌頭貧民旣苦追呼富戶且將破產是牌頭無故而爲官身誰不畏懼避鄕正甲長之累而不顧牌頭之禍其不可二也牌文每月繳縣無副冊相鉤檢脫有事故發冊蹤案吏胥舞文可以銷毀抽改其不可三也事旣造端而經制不定他日有喜事之官更爲條例勒壓奉行卽有不便無從公議其不可四也或遇貪暴之吏因事造端月責結冊日責循環民閒旣未有章程胥役縱横聽其需索事無統紀誰則支之是無監督冊報之費更甚於監督冊報其不可五也方今官吏憒憒惟利私是騖民生之計視若越人之肥瘠先生爲鄕里奮身創此良舉幸而撫軍廉正主持於上又幸而郡縣之長皆臂指相使搢紳之族皆同心頫首相與協力於下失今之時不圖久便之計異日者長吏非其人州縣更相猾當此之時而事勢奔駭先生雖欲出死力爲鄕里捍衛豈可得哉其不可六也故曰發之易收之難靡不有初鮮克有終先生旣已發之矣不自我定其事他日不善事者敗之眾怨之口將以先生爲實其不可者七也負此七不可以行三無益此豈先生與撫軍綢繆民政之意哉愚以爲當今之務其要有二一在蠲本平戶之費一在杜滋擾之源苟此二者得矣雖監督冊報不爲繁且難也茍不得雖不監督冊報不可一日以行勸課富室使出財於公主者掌之領牌冊報之費則以此給官事􅉆億之費則以此給有所稟報舟車飮食之費則以此給在牌之家惟貴其檢察無隱而不使出一錢向之門牌錢皆可除免其有廉得奸宄者又取於公以賞之則民知有牌之利而􅁯其勞矣甲長鄕正之名近於爲官役不若鄕設一局以紳衿一人總理士夫數人輔之謂之董事牌頭無常人輪日充當謂之値牌如此則牌頭之名不達於官董事民閒所自舉不爲官役又皆紳士可以接見官府官吏雖欲擾之不可得矣􅀡牌有總理董事爲之庇可以不畏彊禦知追呼所不及可以不懼株連則牌戶安矣􅀡牌日日所記上之董事董事核對而錄其副上之總理貯存於局而原牌報官十日一登其事無幾而又有保長爲之役則董事亦可以不患勞矣民閒旣有副冊總理守之以稽察一鄕有事則與公牌相檢胥吏雖欲爲奸不可得矣然此數事不出於上官不足以率眾而爲久遠之例願先生條其利害酌其便宜更咨撫軍請札飭到縣遵照奉行則可以必行而無弊先生之功於鄕里豈一時哉風聞撫文到縣本不擬奉行近因首領官有虧公帑者請於太守乞行此牌藉行塡補此時各鄕觀望惟先生是視牌式朝出則婪泉暮入願先生力持其事勿以爲貪吏之資百姓幸甚擬撫軍札飭事例一儲公費保甲之法原爲保安富戶起見一切冊報往來之費旣不能取給公帑若按戶科派卽貧民不能不受其累地方官宜勸各鄕殷實富戶捐資輸公卽於本鄕設局存貯公議一人司其出入㑹計以僃領牌報冊及修理寨柵公事車馬之費其有給賞亦出於此收貯開銷皆聽本鄕經管地方官一切不問一專責成舊例有鄕正甲長牌頭次第檢統然牌頭卽十家之一責以領率勢有不能甲長案牌立人所用旣多轉或賢愚不等今惟大鄕鎭立公局局立總理一人以本鄕紳衿素爲人所敬服者爲之酌其地之遠近立董事數人以本鄕有才德能辦事者爲之皆聽本鄕公同議舉地方官不得差派又不得以保長充當小村坊但立董事一人附於大鄕鎭公局十家共爲一牌不論牌尾每一家輪値稽查五日更換謂之値牌每日日將入値牌持本日縣印牌文親赴各家稽察有無事故或有外出遠歸或有親戚宿歇一一塡注牌中各名下十日彙送各董事各董事各領每月副冊一本每十日値牌送致牌文逐一察核塡注副冊每月初三日彙齊一月正牌副冊送至公局總理親自檢查初五日令保長送縣正牌存案副冊鈐印發貯本局以僃攷對毋許遺失凡十家中有不孝不弟酗酒打降窩娼窩賭淫邪偷盜者同牌之家吿知董事總理總理董事先行勸戒果不可化誨卽令保長報縣究治如同牌知情不舉事發之日十家同罪如有來歴不明之人來往住宿値牌之人必須盤詰茍係可疑卽吿知董事總理董事詳加察驗果係奸匪吿總理令保長報縣究辦如値牌漫不經心以致容藏匪􅀋事發之日與窩賊之家同罪其有查出奸匪呈報得實者總理量事給賞誣吿揑報者以其罪反坐董事隨時稽察各値牌知其勤惰或有怠慢不遵約束者吿知總理許卽送縣究處總理稽察各董事務期實心辦公倘有怠玩及滋事者卽公議更換幷議罰條以示誡警爲總理者亦不得曲狥已私各矢至公以爲鄕里表率總理不稱職許本鄕赴縣呈請另舉一杜擾累保甲之意所以使民相保相受乃是百姓自顧自家自保鄕里並非官爲督責自來行之不善官民相違胥役滋擾往往反以病民今惟責成本鄕紳士遵照條法實力舉行地方官止受紳士成報時加勸導不得令差役挨查如有公事止傳總理面議其董事値牌受法於總理塡造煙戶淸冊編審十家門牌卽令總理交董事辦造底冊保長謄寫報縣不得假手吏書其底冊送縣鈐印發貯公局以便核對毋許遺失每月需用日報牌亦聽各鄕公局照式印造送縣鈐印每月保長赴縣領一月牌交與總理分給董事董事十日一給牌戶領牌鈐印地方官嚴飭胥吏毋許稽畱一謹編審編牌以十家爲常或多少參差附近合編亦不拘一務須街巷鄰近整齊皆由董事編派不問官民大小戶一體均編總理董事保長皆在其內廟寺尼菴亦與民家同例輪日値牌女戶單丁不在派例客店來往人雜所關尤重除一體編牌列十家稽查其本家夥伴外另給日報牌簿每日塡寫所住何人何人何業何往務須淸楚不許蒙混此簿亦與十家日報牌一例報局以憑報縣副冊存局連坐例並同乞丐無歸易藏奸匪每鄕令總理酌與公所歇宿丐甲造冊查點日閒任其行乞夜閒必歸一處歇宿如有不歸歇宿卽逐出鄕不許容畱丐甲不察有事連坐每月朔日各董事赴各家門首檢月內生死出入卽於門牌上改注仍於副冊上注明俟歲終另造淸冊另注門牌一謹巡更每街每巷或百家或二百家爲率處處設立寨柵同柵之內合力巡更皆聽總理董事相地分派十家牌式某縣正堂爲保甲事年月日奉撫憲牌開云云等因到縣爲此合行遵照憲式給與各鄕十家牌各宜仰體憲心各顧身家各安鄕里實力稽查毋得視爲具文自貽後悔須至牌者計開某鄕某都某圖其街巷第牌第一戶家長親丁男人女人婢妾僱婦親戚夥伴人家人僱工人人第二戶以下同以上十家爲聯務須共相親睦彼此互相稽察如有忤逆不孝酗酒打降窩娼窩賭姦淫邪盜違礙不法之人同牌之家卽行吿知公局董事以憑送官究處倘有知情隱庇不早首告一經發覺十家同罪各家亦不得挾嫌誣吿如有首吿不實如法反坐年月日給發挂値牌門首門牌式縣正堂爲保甲事年月日奉撫憲牌開云云等因到縣爲此合行遵照憲式給與各家門牌塡寫合家男婦花名年貌職業各各張挂門首以憑逐日稽查須至牌者計開鄕都圖街巷第牌第戶家長年歲生理現在弟年歲生理現在子姪年年歲歲生理現在生理現在親戚係人年歲夥伴係人年歲婦女共人婢妾共人家人僱工係人年歲僱婦氏係人夫現在子年月日給發懸門首日報牌式縣正堂爲保甲事年月日奉撫憲牌開云云等因到縣爲此合行遵照憲式給與十家日報門牌本日酉時該値牌親持牌文詣同牌之家僃細查問有無生死出入或親戚來往歇宿塡注牌內務必實力稽查毋得狥庇容隱自貽後悔須至牌者計開年月日鄕都圖街巷第牌値牌查得本日同牌十家第一戶生去死來出入第二戶以下同如有生子女者則於生下注某人生子或女有死者則於死下注某人死有出外者則於出下注某人往某處作某事有歸家者則於入下注某人自某處歸夥伴僕妾有去者則於去下注夥伴某人去或婢僕僱工某人去有新來者於來字下注新來夥伴某人係某處人年若干歲婢僕僱工男婦皆同有親友在家住宿者則於來字下注親戚或朋友某人自某處來住宿至其去則於去下注親友某人往某處去如住宿未去則於來字下注親戚某人未去如本日無此等事卽於各項下注無字年月日給値牌煙戶淸冊式卽照門牌前云云合行遵照憲式編聯十家造具煙戶淸冊副冊卽照淸冊前云云除遵照憲式編聯十家造具煙戶淸冊存案外合行造具副冊給與本鄕公局總理董事存貯以便按冊稽查乞丐另造淸冊客店日報簿式十日一本縣正堂爲保甲事奉撫憲牌諭遵照編審十家門牌各戶協力稽查務使民安盜弭除已給牌日報外惟招商客店四方行旅往來或有奸匪潛藏尤宜細心稽察爲此遵照憲式給與日報牌簿該店每日行客住宿問明姓名住址從何處來往何處去有何貨物一一塡寫簿內十日一報本局董事以憑彙報本縣存案該店家尤宜實力稽查毋許容畱蹤迹可疑之人倘漫不經心以及塡寫模糊倘奸匪發覺該容隱之店卽與窩家同罪凛遵毋忽須至牌者計開鄕都圖里第牌第戶客店年月日住客人一夥客人係係人人從來帶有貨往在店住晚以下皆同乞丐甲頭日報牌式縣正堂爲保甲事奉憲編審十家門牌除已給牌日報外惟乞丐流民易滋奸匪爲此遵照憲式給與甲頭日報牌簿該甲頭點集本鄕乞丐願在本處行乞者日閒聽其各處行乞至晚歸公所歇宿甲頭親自査點毋許一名不到倘有不到公所歇宿者卽行逐出不許在本鄕行乞該甲頭每日查齊塡寫牌簿十日送報到公局董事以憑報縣存案該甲頭仍宜稽查各丐其有爲匪滋事報局究處該甲頭狥庇隱匿一經發覺懲治不貸須至牌者計開鄕都圖乞丐人住年月日甲頭查得本日乞丐病死去來有病者於病下注某人病有死者於死下注某人死有不歸者於去下注某人不歸有新來者於來下注某人係某處人年若干歲有無兄弟妻子從某處來記族弟平甫語呈座主阮侍郞嘉慶四年八月二十日惠言同姓弟浩至自陜西浩以去年冬省其母舅陜西鳳翔府寶雞縣丞陳瑺適瑺奉委商州鎭安縣知縣浩隨之官於十二月十三日到鎭安至今年六月二十二日吿疾回省浩亦來京鎭安最爲軍興往來之衝官兵與賊狎至城下浩皆於城上觀之浩云賊首張漢潮及其二子鎭龍鎭虎一女壻所領賊合止五千餘人時合時分出沒興安漢中商州界漢潮之弟張應祥別爲一股有萬餘人竄入甘肅賊有馬步其步賊皆毆掠之眾易於就擒馬賊號爲隊子馬每十數人爲一隊各用長矛陜西人類能用矛不必賊也行步整齊衝突甚銳賊中亦有火器置不用鎭安舊縣關隘關也遊擊周健勇以五百人守之架五炮以待賊賊至炮一發賊中伏而左右進死者三而一炮聲絕而賊登遊擊傷矣其人類不懼死常獲一諜搒掠之百方視其色無苦有敎以􅉆神香爇其後竅乃呼痛焉葢賊之邪術能使不苦斫刺故死不避也明將軍屢過城下部伍錯亂或止營城外軍士輒紛紛城中莫敢呵問索倫兵日有病者所過州縣養病兵常二三十人畱輒數十日明將軍常乘大轎止正營常在賊後百餘里自浩到陜西半年之閒官兵與賊戰者三其外未嘗接刃也明將軍與賊戰於寶難幾爲賊擒折傷甚眾五月又與賊戰於鎭安之石甕子殺賊三百餘人我兵死傷者七百餘人賊退去石甕子去鎭安城數里其戰浩所親睹也永撫軍初到時厲氣奮發誚讓明將軍以避賊之咎引兵四千追賊及之於漢中府界爲賊所鈔亾其後軍死者一千七百餘人文武二十七員自是不敢復言殺賊矣鎭安城中有兵三百人鄕勇五百餘人有警時知縣巡守者守者臥撻之起一人起一人又臥矣鄕勇應募者不能知其何許人其來也問守乎曰諾曰戰則鬨然散其居民亦有團結村落自爲守者往往能拒賊或以無救破滅聞去年盩厔縣有石峯鋪者鋪名或非浩偶􅁯之其民三千餘家防守甚嚴屢殺賊賊怒甚以全力攻之前巡撫秦承恩營相去三十里乞救不許遂爲賊焚三千家無少長皆死聞者咸爲流涕甘肅蘭州府知府龔景翰爲堅壁淸野議上之前總督宜緜欲爲民築堡寨使自爲守以捍賊而官以游兵策應宜緜稍稍用之興安府屬有已築堡者賊皆不敢犯浩又云去歲四五月閒賊犯盩厔城外人聞賊至皆走入城從城上望須臾賊六人先至操矛下馬徧索空室中得一老婦將殺之民有兄弟四人奮然怒請於知縣人假一矛縋城下殺其五人生獲一人入城斬之俄而前提督王文雄以兵三千至城中大噪賊遁去文雄迅追日暮及之賊已駐營矣我兵撲入賊大潰文雄令勿追立營爲食嚴儆以待夜半賊大至爲圜陳向我軍我軍急擊賊開其中而外裹之我軍不得出文雄力戰比曉賊圍潰凡折傷七百餘人殺賊二千餘人盩厔以全右張浩所說近者目見遠者民間相傳人人共知雖一人耳目不能周而情狀大略可見賊敢死而我怯戰賊整齊而我兵無紀此所以不支也然賊雖四出蹂躪而終不敢遠其巢穴見城不敢攻見堡不敢過是其心未嘗無畏特易我無僃耳竊觀龔景翰之議深合事宜誠使朝廷采其言擇良督撫而責成之使選用良守令專以安民爲務而禦賊卽在其中不過數月邪黨壞敗此與調兵追賊爲功遠矣謹錄一通以呈省覽倘可上聞行之天下之福實在於此且夫善用兵者制人而不制於人今以有限之兵逐無定之賊鑿道而行仰山而功賊逸我勞賊主我客其勝者幸耳至於招募無賴守不足以益固而奸民或出其中爲患甚大當事者尤不可不慮謹狀上答呉仲倫論文質書仲倫足下辱賜書敎以文質之說引經正義甚壯而美伏而思之至於積日竊意足下未喻僕之說也足下之言其要者以爲文與質必相稱而偏重者末世所爲僕之說豈不謂爾雖然禮樂者道之器也文質者禮樂之情也尚文尚質者所由以入禮樂之途也先王之以禮樂敎天下同而天下之所以用禮樂者不能不異葢君子之於禮樂也賅其本僃共末範其過中不及而一於道故曰無本不立無文不行文質彬彬然後君子三代所以敎士皆以此也至於民則視其所將入者而防之視其所旣敝者而矯之葢防傾者必持其未矯枉者必過其􅀡旣道之所用在此則其勢不得不偏重偏重焉而旣至其平則聖人又將有變焉不幸而無聖人則其重遂日積而不可止夫聖王豈不知偏重之將不可止哉不如是不能使民入於禮樂而禮樂之敎行則百世以俟聖人者無惑矣耳足下云忠信之謂質禮樂之謂文夫忠信之與禮樂固不可相代宜乎不敢道文質之有偏重也果如足下言則夫子從先進於禮樂是從於文也又烏以謂後進文而先進質哉凡先王所以敎天下者其說如是其意未嘗不如是故上下相喻而民心可同然而曰民可使由之不可使知之者謂其用吾法而止不可語上也若今實未嘗重質而其尚曰質實未嘗重文而其尚曰文內以誣其心而外以愚天下天下其孰從之吾恐聖人之意不如此也若使文質果不可偏重聖人必不立乎其名而欲天下之臻乎實聖人亦不能也故吾謂文質無不偏重偏重而適中則忠敬文之敎爲之也至其末流則聖人之所無如何也足下但論帝王之治果一質一文否耳偏重非所疑也三代以後未始有文者知其不可也吾之所謂文質者固將從興禮樂始若以足下論之又乃尚文也老佛之法僕未嘗以爲質也以其說近於質故民之惡文者樂之其理然也足下以爲禮樂不興敎化不行其病在未始有文至從老佛之徒去君臣棄父子則以爲不知有質是足下之意以禮樂爲文而以父子君臣爲質夫父子君臣文質禮樂之歸也而豈與禮樂爲文質哉足下方以道自進而不茍爲文故敢以所疑質然僕之論千餘言而意乃使足下未喻則僕之文之不足自達其所說而僕之說之不足於君子之心也審矣講求其非以趨所是非足下之望而誰望焉不宣與錢魯斯書野余大兄足下曠歲遐覿一拜嘉命省書忻然若覯容色三年不見東山所爲長歎萬里一札昔人比之漆膠况孟公之尺牘安石之簡記弆之以爲榮者哉見所與崔君南書自說欲以三年之力專學篆書足下作書不懈及古於是見矣夫篆徑生隸隸密生分分飭生楷原流體降不紊由來則筆法可知者與分楷之法所以傳者由作者代工而古刻多有今篆文之存於金石者尠矣譌贋者又甚焉學者不見古文各以意爲點畫至如琅邪繹山􅄱具焉耳陳倉石鼓世疑非眞然揆厥典型此爲最也若乃漢人之書碑碣􅋕署粲然猶存大都奇恣縱宕鳥駴龍擾其筆墨之所出入意􅁚之所來往隅鍔之所激厲波瀾之所動澹葢亦足以尋其毛角會其神恉者矣唐李陽冰書自出新意一爲工整昔人謂其筆法如蟲蝕鳥步今觀所傳怡亭石刻奔放跳躍其於古法軌轍猶存餘者率妸媚孅脆葢是俗工摹刻非其始然而世之學者局於所見苟遂固陋謂傳刻之􅄱爲眞訾漢人之書爲詭異謂篆法不得與分楷同豈不謬哉自錢獻之以其姸俗鄙陋之書自是所學以爲斯冰之後􅀡至小生天下之士翕然宗之二十年矣今京師名士盛爲篆學大氐無慮奉爲憲章橫街塞衢牢不可破當世能篆書者有懷寕鄧石如字頑伯往年到都下都下書人羣排斥之鞅掌而去惠言夙好於此未能用力偶以意作書已爲諸老先生所訶怪石如爲之甚工其人拓落又無他才眾人見其容貌因而輕之不足以振其所學不有大君子奮起一世興張正術六體之勢恐遂湮絕可不哀􅁘要褭不服倛相而駑焉龍泉不御鎖石之華而爲敗矣此又士君子所爲憤發也己酉之春見足下爲王學愚所書繹山碑石鼓文巳歎卓絕今若以三年之力成之廓淸之功非足下而誰石如今在揚州或扁舟過江一見相語惠言往爲作書勢一首錄草奉呈又望江南花賦一首近作亦附往足下觀之可以識僕比者結興之所存不宣與陳扶雅書扶雅大弟別來忽忽兩月無任馳思治經術當不雜名利近時考訂之學似興古而實謬古果有志斯道當潛心讀注勿求異說勿好口譚久久自有入處此時天下爲實學者殊少扶雅倘肯用力不患不爲當代傳人但勿求爲天下名士乃可耳明歲館於何所此閒欲爲地竟無所成想亦自有定數不足爲慮惇行勤學惟此爲望不宣
