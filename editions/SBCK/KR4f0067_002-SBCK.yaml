body:
  text: 經師誠傳代分宜張氏二節婦傳代封中憲大夫大理寺寺副吳君墓誌銘代富陽縣祭先蠶祝文代富陽縣賽蠶祝文代祭史乙山文代祭蔣觀察文代祭江均佐文代祭曹大司農文代公祭湯松齋文公祭湯太夫人文茗柯文外編卷下武進張惠言經師誠傳代邑有老儒師曰經綸字師誠自號拙漁其先河南人遷儀徵九世矣祖宏錫早卒祖母呂有苦節事在縣志父曰文恭師誠習舉子業喜爲羅萬藻之文補學生員屢試高等督學使者李公因培察其文行尤異優貢之是時師誠請假歲科試皆未與人多李公能得人師誠幼則知孝嘗刲股肉以療其祖母疾事父母曲謹誠篤父得痺疾晝夜侍養數年不衰家貧敎授鄕里以奉親未嘗廢左右其貢成均會父卒服闋一至京師赴考選甫畢忽心動急束裝歸則其母疽發背甚殆顧見師誠喜遂差師誠自此奉母以居有勸之仕進者答曰吾奚資而養耶凡十七年母卒而師誠老矣性狷絜不􅄭取雖從學者以厚幣延致度非其人弗應也饘粥不繼充然有自得之色竟以貧困終性喜酒飮數石不亂酒間談經史亹亹益可聽言必信行必果邑之人知與不知咸謂經先生正人嘗出遇鬬者於途愕然視曰先生至耶竟解去師誠有二弟性皆戾師誠遇之怡怡卒不入于咎君子是以知師誠之德有于中也年七十九卒葬城東五里王家塋無子其弟有二子比師誠之卒相繼殁經氏無後焉論曰古者祿以代耕故家貧親老而不仕比之不孝師誠以養故不敢謀仕士之處貧豈不難于古人哉然師誠以諸生行義見重於鄕里父母兄弟間有足稱者師誠有詩文集曰􅊃且稿曰寸蚓吟所著曰蠧餘集不能工其可傳者固不在此分宜張氏二節婦傳代國家歲詔禮官旌表節婦凡年未三十而夫死守節及三十年者州縣申於巡撫巡撫上其事禮部歲十有二月禮部覆議以聞許建坊表其門而祠之其縣天下上節婦名者大省常數百人次亦百餘人嗚呼何其盛也豈非平治日久禮敎興起風俗茂美之效歟然其不及於例而不與於旌與其例得旌而子孫貧弱不能白于有司以致泯滅者又豈少哉夫婦人女子非讀書識大義而能忍茹荼蓼以成其節類至性使然豈以榮此名哉然以國家褒揚幽行之典而有不幸而不得與數十年之後其名與事倶殁此有司之所無如何而賢士大夫有文之士所不宜忽也門下生比部員外郞分宜楊曰鯤爲余言同邑張氏二婦節至苦而未得旌請余次其事故作張氏二節婦傳節婦袁氏父曰士超夫曰張尚鈺生子女各一人而尚鈺􅂮婦年三十撫其子成立矣而又早􅂮則撫其孫孫又早死撫其曾孫曾孫又死婦及撫元孫焉嘉慶二年節婦卒年九十五守節六十六年女適國學監生趙廷來數月寡亦守節得旌焉節婦袁氏父曰際超夫曰張宗松張氏世居里曰泗水明有刑部侍郞承詔尚鈺六世祖也宗松干尚鈺爲某行際超爲車頭之袁士超爲㘵頭之袁不同族節婦年十六歸張氏生一子年二十而宗松死有祖姑婦孝養之而撫其孤以長以學能文試童子而早死而娶亦輒死遺一子婦復撫之今年五十守節三十一年矣論曰婦之守節成其身耳其能事舅姑育其子以立則功于其家若尚鈺之婦其存亾乃繫四世宗松之婦上以養祖姑而下鞠其孫嗚呼兩婦之于兩家顧不重歟封中憲大夫大理寺寺副吳君墓誌銘代君諱之駿字瑤驂自號損齋姓吳氏世爲歙之豐南人豐南之吳祖唐宣議郞光是爲左臺御史少微之九世孫光二十六世至國子監生慧中君曾祖也江都學生趙範祖也考曰爾衮贈中憲大夫配程恭人生二子而君爲仲君幼頴悟讀書所見成誦爲制舉時文下筆風發士林器之年十五喪贈公二十而兄亦卒家饒於財懼先業之隳也遂棄舉子業理生產內外井井其治財務守法而任人畫一不假借愚智皆盡其用以故家益振君旣善殖財尤好散之鄕里之惠無不倡鰥疾窮困之戚疏無不恤橋梁道路之所由而隳壞者無不治旣與其族人置義田又將謀立義塾未及而卒年七十有八配同邑潭渡黃氏生子荃生誥授中憲大夫大理寺寺副改授部正郞封君如其官配爲恭人女子子二人適汪氏程氏孫一人曰瑞欽曾孫二人元孫三人瑞欽余之姊壻也君之卒以乾隆十四年月日黃恭人先君卒八年年七十爲乾隆六年月日其後幾十年荃生卒于是嘉慶年月日瑞欽奉君及恭人之柩合葬於富丁山之阡而以狀來請銘君與先大夫未嘗相識聞先大夫之行高之求余姊爲瑞欽婦是時君之宗鼎盛而先大夫未第或笑其非耦君求之益堅迨余姊之歸君已先卒君之子每見先大夫未嘗不俯首感􅁣道先人之雅慕平居不能去于口嗚呼君之所以交于先大夫而君之子所以不􅁯其先人豈非古人所謂好善若不及者哉然則先大夫之於君亦可知已矣此余於瑞欽之請而不敢以辭也君晩病目不能見物而神明不衰嘗以手揣人葠知其美惡高下不失絲忽人以爲奇銘曰才不施家之承德不隳後之憑澤不拕世旣稱銘之不鈋後其徵富陽縣祭先蠶祝文代年月日具官某謹以柔毛剛鬛淸酌庶羞之儀致祭於先蠶之神曰穀雨至矣維桑之猗猗蠶將育也厥歲載登民奉公繭給私服也匪民之成繄神之靈降嘉福也古有躬桑自上下下遍民牧也今長百里壇祀不給胡神事之肅也迺絜牲酒侑嘉穀也卜日戒䖍申禱祝也幸神休之鑒誠告也我桑孔庶蠶盈蔟也家有繅盆戸機軸也令與斯民拜神祿也尚饗富陽縣賽蠶祝文代年月日具官某謹以一元大武柔毛剛鬛致祭於黃帝之靈曰維帝鑒儀垂衣貿厥卉服粤迺嫓於元妃是興絲紅以襄我枲事俾萬禩之宙永有攸被今程繭畢效有夏之秋共惟帝休是賁是服用敢祗率憲典薦兹歲事以拜帝成以啟嗣歲之穀尚饗祭史乙山文代古稱德人亦曰載采其施及物是謂令豈在國及國在家及家厥施不窮德乃不暇公家北來始自君考欒欒棘人謀葬於道父以孝􅂮子以孝成克家之始窀穸是營遂恢前規遂嗣先志報本追遠上及百世乃新祠宇輪奐其崇乃展􅏀墳馬鬛其封爲之經產以贍祭祀爲之儀式以肅追繼小宗之支一祖有八南暌北遷网或攸括父曰鳩鳩聿來于于買田以粻買宅以廬處則有賴出爲秀髦食公之德儀問是昭㫄逮六親姻族之黨朋儕交遊禮接義往孰朝不餔孰冬不袽孰吉不衻孰凶不苴孰孑無親孰難無謀孰履而危孰茹而憂濡不侍依呴不待附因心則仁先謁而豫蘇枯潤荄決江灑河人集于蓼若已是瘥餘恩所屆有惠网遺寒來以衣饑來以糜􅁀爾孰室病爾孰藥及爾葬埋枯骨攸若凡公所爲匪􅀡也仁知及宜措信勇則均不資寸緡亦殖其算約取博施薄積厚散中年始學乃蔚其文一發而彀藝林播芬我觀公才足辦艱鉅位不偶德孰嗇其遇如何昊穹復靳其年天道右善公胡不延桑梓奚式孤寒疇依里巷相弔親知內摧維公嗣哲永世克紹文孫繩繩兹迪彝敎推公所施以澤于民公所未用後將大申人誰不死公死而思德成譽終其奚有悲淸酒一尊生芻一束播公遺徽以永遐躅尚饗祭蔣觀察文代韋楊之門世有肄勤猗維我公如璞啟琨有儀其淵有範其温爰初味道乃經乃墳謂督勤勞比其諸昆曰材克家曰德濟世乃典侯社乃省􅀖事五最邑計三考州試守于四邦我政則理晉之崇階觀察是使􅉭􅉭大河苞絡冀豫泄厓潦鞠以潰以輸漫漫儀考地泐匪序支疏衇引若指調股公鳩兹功載事在許具告百姓畚鍤輂舉汝力汝勤汝奠汝撫民以大和功用時敘亦維沙津伊洛之阻時和吿溢湍漲伊瀦分此豫民魚鼈是伍公時挺身攸集攸御馮夷蛟鼉䠞縮沮東尋川涂有截其汻公在懷慶受命大府南堤之功爾拮爾据公尅其成若契斯舉靑龍載寕防奠罔虞公在開封堤又失固灌于淫秋潰不可禦公當楗菑河公用許曾未浹旬有屹其蔀公來豫州民安公功帝嘉公勞錫之寵崇公去豫州民勤安庸帝考公成復之光龍弗慮弗圖乃鞠乃凶曾是利器委之鬛封疇昔之日拜公登堂循循誘言及乎文章云有少作成之一囊立言有命千金何享自我手棄愈乎牛場讀公遺文泰山豪􅉭後來者誰登之縹緗五湖之􅏀九原􅃼􅃼何以送公山阿夢傷旣載淸酤亦有桂漿撫筵漣洏告靈庶饗祭江均佐文代繄吾宗之靈毓系伊敱之遠胄肇鼻祖于州倅鬱橙陽之異秀世載緒而有紹偉令德之維舊嗟哲人之誕起纘樸斵之堂構禀淳和以挺質敷藻采於刻縷澍淸才以如水曜朗懷而若晝粤家督之􅆒對任帝采之奔奏始含香于署粉遂秉節于豸繡仰二方之公望實元先而季後彼三公之啟事佇淸班而企覯樂朱薄之華養輟丹棨之榮守承思柔之令色潔滫瀡於馨豆美庭闈之養志懷天澤之沃厚效臣敬於嚴父奉太上之萬壽接温和之天語拜三賜之命侑沐恩榮之稠㬪嘉忠孝之兩副怡餘情於翰墨親風雅于圃囿品三唐之碑版摹兩漢之篆籒花春秋而繞砌石迢遞而當廇輝山林以鐘鼎和絲管於禽鷇彼齊相之三族樂晏嬰之德茂維好施而弗惠卜向氏之世袤倬大田之疆理沛我耕而子槈羣服義以歌德羌育弟而長幼伊賤子之寡昩附葛藟之味臭飫深談於便坐罄情懽於家酎每聞聲而相賞若響答而音叩方孟冬之旬季蹇吾駕而西首攬征衣以延佇奉裏言於宿畱謂桑梓之恭敬實先人之所懋淹歲月之忽晩懼前志之弗就欽英風於節愍激壯志於顚仆彼貞松與勁柏厲霜操於中冓安神魄之無所曷以承乎詔酭相雲郞之遺阯有五季之靈鷲湮陊剝之弗理亦里閈之所陋汨布射之谿水決百里而通澑閔行旅之深涉紛沙石之相潄憶兹事之遲久實經營之莫簉幸吾輻之員輔庶前修之終究承淸命而戒道望􅁌月之未彀驚訃者之在廟怳夢寐之相遘輯長志于短晷掩豪襟以屬柩雪余涕而東顧見千㬪之雲岫望繐旌兮弗及仰淸塵而難又考龜筴而載卜協靈占于爻繇鳩工師而庀材審曲勢于仰覆冀他日之考落慰夜臺之勞疚酌淸尊于琖􅕌薦芬芳於鬐腠悵弗親于沃酬用舒于哀懤陳嘉辭而告衷魂彷彿而來右祭曹大司農文代嗚呼公之前人及我先考共有懿德永言作好公舉于鄕歲惟壬申我之哲兄與於國賓我生之年與公同辰世德相友交如弟昆謂篤前烈申之婚姻公居翰林我來京師合方同術切磋是資傳公之粲舍公之館春華耀晨秋月開晩飛觴接吟漏永燭短懽言綢繆道論悃欵意使我消志爲君滿結轡聯袂十有一年位望彌崇謙德彌然公在夙夜帝采是宣我歸衡門躬耕故園出處則異交期㒺愆白雲在天淸暉在淵帝有恩言命公壽母還公南陔以敎孝子何以錫之豐玉文綺何以命之宮秩崇禮公奉魚軒藹藹多暇我升公堂爰笑爰語澹臺公事靖節巾車子先我後陶然有餘謂言林泉差勝衮黼我老長閒松菊在戸公於蒼生舟楫霖雨終當舍去不我能侶他年台鼎眷此衡圃何圖不淑景命中頽萱枝未凋喬柯早摧在兹孟冬日月相望公來過我翩然在堂譚深坐遲隅影傾廂欲去中輟淹畱回皇曾是淹辰公訃至㫄千載一訣念之永傷公之服官􅂤在密勿宮􅀸疑丞尚書喉舌內史貳典京尹憲則爰升計相邦賦是式帝曰其勤亮采有秩出敷文敎亦讞大疑經術爲治於古得師公之寵眷不替益崇集福于親丕休于公帝曰夫人期頤延祐母壽無量以永公譽如何色養曾不逮終棄此慈闈下彼幽宮光光君恩慘慘母容嗚呼公悲悲其有窮公之行誼厚德有施勞謙小心抑抑威儀旣在四輔如未第時在邦在家無怨無咨公之貽澤垂裕式邵明明詹事宏我王道及時昆孫領聞迪敎明昭肄勤永世克孝學世其傳德世其紹公殁不亾彌遠有耀人生大暮百年有期公生而榮公死而思以此慰母庶開母哀以此慰公公其勿悲嗚呼尚饗公祭湯松齋文嗚呼聞天道之聽邇恒善福而順祐何生民之多囏曾所信之不售維夫君之淵哲毓殷子之懿胄嘉信國之駿烈世載緯乎維舊基潯州之卓綽裕詩禮之堂構挺英姿以煥發恭淸芬而時懋洵山暉而璞潤實林蟠而條秀扶章質以規矱粲華文而刻鏤肇起家以載采列河壖以通守最上考之舊課試雄州之新授瞻靑嶽而城專雍朱幡而斧繡政優平而美化澤遊豫而充究導善氣於􅃻扑載和風於耕耨時維君之家督職旬宣于奔奏􅂤南蕃之雄服奉中旨之渥厚雖叔出而季處猶屺忉而岵懤君陳情以將父帝嘉誠而許副循陔蘭之馥馥采陵華之茂茂偉移忠以成孝信爲政之兩就何嚴霜之易催迫大椿之夜仆繼􅀗心于資父效反哺于烏鷇春秋忽以迅逝日月驚其若驟風雕柯而未靖霜隕草而仍覆傷棣華之萎落懼傾陽之頽漏招搖指於隅孟陽琯中于太簇愴原薤之晞露歘淹刻而再遘胡夜臺之相逐羌母先而子後聞在毁而滅性固禮敎之所陋實懸天之偪促非併命於嬛疚罄終天于短晷掩苴忱以屬柩嗟有終而不終胡宜壽而不壽行路猶其相閔况銜哀於北首思人生之難恃等寓形于浮漚惟生安而死順若入傳而出僦繄哲人之執孝實如毛之德輶承前修之丹雘裕後慶於俎豆澤流引而澄泉光日新而常晝喆嗣蔚其蘭玉文孫翩其鸞鷲佇承家而襃大若勿幕之幷收以此慰夫下壤庶損悲而開疚神彷彿而下臨鑒生芻于氣臭嗚呼哀哉尚饗公祭湯太夫人文吾郡世族惟前黃楊世有通德家承義方明明太史編修士徽士行作紀篤生夫人禮敎是視動則閫範言思女模令儀淵淵淑愼與與作嬪於湯嫓我潯州內政有家以爲官休我聞召南鵲巢之篇德如鳲鳩乃可配焉繼母如母於禮有經孰云養子而私所生俗薄道媮婦德伊始猗惟夫人情以義起孰離于裏孰屬於毛恩斯勤斯母氏之勞匪恩實均於敎亦疇芝生五葩葉葉相侔堂堂長公弼亮帝采列藩南服贊議㦸棨歸成夫人氓謌獠謳夫人徽之惠􅄌孔周歸榮夫人揄翟三錫夫人受之景曜孔秩次君作牧成政豫兖移忠究孝馨羞絜膳歸安夫人以廉以淸夫人顧之怡然以寕亦越季子爲善於鄕功民有庸以受寵光歸慶夫人以婣以睦夫人安之介祉有僕施於文孫永世克承其曾其元世哲作明澤曰貽之德曰禕之僉曰夫人是唯丕之集家之休載國之慶謂言夫人穀此德應宜享眉壽永爲女宗如何不淑景命弗融六姻之黨幽窮之族孰寒不衣孰饑無粟孰叩而虛孰請而咨歸于夫人如取如攜沐德浴惠四五十年蘇枯潤荄長子活孫嗟嗟夫人今也則亾里巷相弔親知內傷往昔之歲長公遘痻曾不周期鞠于夫人天未悔禍再戕寕海母先子後一日相待悠悠蒿里慘慘泉臺子以孝亾母以慈摧唯桑唯梓則敬則恭曰惟夫人達尊壼中承訃偕怛瞻旟曷從陳牲薦醴用告哀衷尚饗茗柯文四編武進張皋文師所定今儀徵相國阮公元已序而刊之矣尚有遺文若干篇善藏之篋笥惟謹去年遊閩同門友興泉永道富陽周君凱見而欲授之梓人屬內閣中書光澤高君澍然汰其率爾之作存若干篇分補編外編上下各二卷或問曰茲編皆先生昔時所刪存之奚爲善曰唯唯否否先生之定前編時方􅅧造於易禮之學將欲鉤􅅧致遠以立言不朽故其所撰著僅有存者若天假之年使遍觀夫政治之通變人事之盈虛物理之揚詡悅心硏慮發爲文章則前編尚慮有所汰焉而况於茲編也與今先生往矣先生之遺文不可復睹矣嗚呼自宋學興而漢經師之傳晦先生闡消息於孟氏紹爲容於徐生使漢初至今二千一百餘年寢微寢滅之緖大明於時則先生之文雖有􅅧有淺有原有委無往非道之所散見也可以其緒餘而棄置哉昔蘇軾云歐陽行樂處草木皆可敬草木亦何與人事而人猶敬之况先生之道德見於文章者乎先生之文章世所共寶况於親炙之者乎然則茲編之刻烏可已哉後之讀者由茲編以窺前編之文則先生體道之精微可見矣合二編以窺刪存之意則先生辨道之􅅧嚴亦可知矣刻旣竟因書其後以質之周君道光十四年十二月望仁和陳善茗柯文補編卷下靑囊天玉通義序胡柏坡印譜序送王見石令福建序送徐尚之序送計伯英歸吳江序江製川五十壽詩序關東紀程刑部司獄韓君家傳陳長生傳故儒林郞祝君墓誌銘茗柯文補編卷下武進張惠言靑囊天玉通義序余讀靑囊天玉寶照書久而不解乃盡屛注說冥心思之積十餘日廢食寢焉夜夢居一室中四周無戶牖而天光入如圭㫄有人曰彼有窬顧而見木格匡數尺三面有材舉而撞之身與倶出則立於雲中下視有廣庭玉蘭一株方花三老人其下食仰而撫掌曰易其通矣寤而異之曰室中者奧語也天光者寶照也乃誦三元四神之章心開釋然皆可語筮之以周易遇剝之坤是爲溓陽子就其母雌苞其雄天降於山而濟其光明是其應地无疆乎余旣不暇爲術又性難行不能周覽窮谷隩區以驗吾說之中否世之爲此者不足與正也姑書而藏之以俟後有好之者將取中焉目錄第一卷靑囊奥語第二卷靑囊序第三卷天玉經內傳上內傳中內傳下第四卷都天寶照經上篇中篇下篇第五卷舊解疏證先後天羅經解五行說水局圖􅇝範右五卷合題之曰靑囊天玉通義胡柏坡印譜序今世所傳官私印自秦以至六朝無不􅌗古可喜至於唐人合者十六焉宋三四焉迄於元明一二而已古者以金玉爲印其爲之者工人耳後世易之以石始有文人學士專以其藝名於世而傳後夫以刀劃石易於範金􅅣玉倍蓰也文人學士之智巧多於工人十百也然而後世不如古何其遠􅁘葢古之爲書習之者非士人而巳隸書者隸人習之摹印刻符殳書署書皆其工世習之而善事利器又皆後世所不逮故其事習其文樸其法巧後世文人學士爲之者非能如工之專於其事也時出新意以自名家又非能守故法也至於古人切玉模蠟之方皆已不傳而刻石之文其與金玉自然之趣不相侔又甚故有刀法而古之巧亾有篆法而古之樣失則文人學士之名其家者不逮於工人其理然也夫秦漢之文無一體而後之文莫及焉秦漢之書無專家而後之書莫及焉豈非世降不相及也哉然要其是者莫不殊條共本先後一揆則可知也是故摹印之事與爲文爲書同得乎古人之所以同然後能得乎古人之所以異得其所以同異而合之於道然後能出以已意而不謬乎古人淳安胡柏坡好古有文善篆隸喜刻石印其始仿秦漢之製以入古印中莫能辨也歙人巴慰祖嘗歎以爲工其後爲之益精乃斟酌古法一以圓轉流動自然茂美爲宗其生平可意者甚多或散失稍稍彙印成帙凡若干方爲印譜葢柏坡之好之也篤其爲之也久而勤純純於古而不苟出新意故能不謬於古若此柏坡非以藝名然而世有名此藝者其必有取乎此也送王見石令福建序方今天下之患楚蜀秦豫之閒則有敎匪江浙閩廣負海之地則有洋匪是皆數十年漸漬引蔓根蟠柢互有司漫不爲意又毆良民而附益之及其一旦不可葢覆乃始相視狼顧莫之如何今朝廷設經略調兵十數萬有司召募鄕勇又數十萬歲縻餉數千萬以事敎匪四年於茲矣而賊日益眾何者兵不習戰將不知兵所施設非其方之效也洋匪出没海畔公關商賈而取其稅刦質居民以求贖金死者百數或時登陸焚掠村舍刦人城市閒國家水師沿海成營者相望將軍提督以下徼巡者相錯非有能制盜者也奸民與盜爲市輒出米物􅉆億之盜資若外府有司非不知也慮茍且旦夕幸一日無事耳夫厝火積薪之下而寢者安其未及然也無足怪今火燎毛髮矣因不加慮後雖欲撲滅豈可得乎此愚之所以大惑也且夫以今之將卒治今之盜雖增兵至數百萬其不足恃章章明甚方今可以治盜者惟州縣爲然設堡柵置燧候立保甲使村落各自團結足以相守足以相救則盜不敢登陸矣閉海口使商賈毋出則資盜者無所竄訓練漁戸資給而約束之使漁近口之處因以捍禦則可以無設兵而守有餘而奸民之爲盜耳目者所在有之胥吏中尤多設購捕置以嚴法使腹心無疾然後手足爲用或曰奸民與盜同惡今除奸民必引盜是生變也愚以爲不然二匪者皆勾結無賴散布黨與然其情勢不同敎匪之布於州縣者皆其徒也是無則已有則必數千百人緩之則可漸攜急之則驟集其勢然也洋匪往來本無定所風濤不測難爲程期苟其黨與必不肯內居徒以金錢誘諸無賴使爲爪牙緩之則聲勢以相市急之則狼狽各不相顧亦其勢然也且夫捕人於城郭之下而聲勢者在海外吾之邊陲皆足以禦盜夫何變之足生使奸民不除吾雖有良法民雖肯盡力而彼能敗之此其爲患至大不可不懼或又曰商賈者國之所資如何而使其無出愚又以爲不然凡出海者皆大賈使其棄數年之利不至失業中國之物不出於外必周布天下於國家爲不失賦至於柁工水師資海舶以爲生者官可收以爲用是兩利也或又謂子之說誠善矣然文武相衞各州縣幷力則可也使其不然而以一縣爲賊的將奈何愚以爲盜乘人無僃而取所利非角勝也一縣有僃其不肯犯大難而希所無利也明矣一縣爲之而效則比縣之民必有仿而行之者督撫必且下其法於他屬將卒壯其氣必且踊躍相助以希捕盜功如此則盜無所資掠又不敢入陸當其窮蹙而誅之而散之易易也故曰可以治盜莫如州縣豈特洋匪哉雖敎匪亦若是爾矣同年友王君見石有志於天下者也以進士分發福建爲縣其爲人識大體氣深慮沈於以辦此無難也於其行序吾說以質之嗚呼使當事者無意於盜則已誠有意也吾之說將可廢乎吾之說不用則已誠用之也將不自王君始乎送徐尚之序尚之以詩古文名天下乾隆戊戌已亥間余尚少方學制藝文而余姊之壻董超然喜爲詩與尚之交最密余以此識尚之讀其詩文其後尚之遊京師校書四庫館試官河南超然往往與偕而余迄不得相見然見超然未嘗不言尚之也超然言尚之居京師時其尊甫被吏議逮詣刑曹少司寇杜公以讞鞫失實得譴事不可測當是時尚之以諸生旅居貧困衣食弗能給出則左右營護事卒得解釋入則􅉆具衣物酒肉起居纖悉無不周辦其尊甫愉然不知逮繫之戚并不知其子之貧也人之知尚之者取其儒雅醇粹而已而吾之重之以此此其至誠抑有才知焉超然言此時眉目怒張神色飛舞聞者皆爲慷􅁣余以是賢尚之又多兩人之交能以道義相取也尚之在河南五攝知縣事皆有聲以憂去嘉慶五年十月起謁吏部引見仍試用河南而超然適以應順天試不得解留京師三人者遂復得偕晤回顧始相識時年各少壯今二十載矣超然與余須始白而尚之髮溓然葢三人者皆將老矣超然旣困有司不得志尚之亦局促於一官非其所樂獨兩人詩古文益奇葢共性情氣槩有非勞苦憂患所能損者余又以知兩人者之所得有在而非世之役役者也余少學詩不成年三十餘始爲古文媿未聞道而尚之獨見許亟稱之於其別也超然曰子不可無言余曰然乃諗之曰古之以文傳者傳其道也夫道以之修身以之齊家治國平天下故自漢之賈董以逮唐宋文人韓李歐蘇曾王之儔雖有淳駮而就其所學皆各有以施之天下非是者其文不至則不足以傳今子爲古之文學古之道立身事親旣至矣獨位卑任之者淺道不得於下古之人不能必其道之果行也而無一日􅁯道之行故十室之邑未嘗不以先王之道治之方今天子申飭吏治大吏方務求才尚之之得爲於時必也往哉以子之事親者當官何事不濟若曰古之道不可用於今則非吾之所敢知也送計伯英歸吳江序三吳地陿人眾民貧而俗奢矜利勢其爲士者没於祿宦走衣食往往遊於四方或數十年不入家門者以千數然其得所志者十不二三夫人至去家室離墳墓舍其父母親戚而汲汲於奔走豈其情之所樂哉其上者欲得仕進之榮以耀閭里而其下者則無以爲家人生產業又不能甘窮餓以爲鄕黨擯笑也夫求不可必得之樂而棄其目前朝夕之歡與夫恥困其身而就心所不樂者庸得謂非大惑邪予友計君伯英束髮遊京師方將銳意進取奮厲於功名一日幡然去問之則曰吾向者之來也固將庶幾升斗之祿以爲親榮今吾知富貴之不可力求也吾有宅一􅒡若鬻而易其居幸得餘金撙而節之可以給饘粥以朝夕奉吾親吾將終焉則吾之樂未可以富貴易也予曰子之年甚少忠信而有文將必有以自見未可爲終焉計也抑士不能謀其家而且能謀天下之人者邪不能樂其心以樂其親而且能有所樂於天下者邪子之歸修身以養親蓄其學以待取乎世則富貴之來將擇於子矣夫奚待役役以求仕宦哉予不幸無屋可居無田可食才力又不足以給生事遊十年而困益甚於子之歸其能以無愧邪雖然困於遊與困於居等困也吾安能就吾心所不樂邪子往矣他日有扁舟過訪君於震澤之濱者非他人必予也江製川五十壽詩序仁足以周其三族及其故舊朋友有叩門者不以匱乏辭赴人之急難必濟此富而好行其德之事也無其財不能以爲居是邦長吏之至者無賢不肖必慕而與之友且厚之士大夫宦遊東西行而過者必聞其名有公事必咨訪焉此貴人勢要之事也無其位不能以爲鄕人子弟之與游者必聞善言有過者不敢見見其人聞其言善者以勸過者以改此長者有道之事也非規其行矩其武則或非且笑之亦不能以爲吾友江君少甚貧逐什一之利少贏息常以義捐數千金罄所有焉至今家資不過中人然一門羣從皆賴以舉火朋友之急視若在已行之不倦不知者以爲巨富人游淮海閒結交士大夫其所居曰東亭東亭之人巨細之事非江君居閒不能辦也然君銜不過六品未嘗仕又無勢援而搢紳先生不能出其右其朋友戚黨所知者及比閭之人有子弟之過莫不竊竊恐江君知或君正色責之莫不立已然君未嘗學酒食徵逐之事未嘗不在其閒詼嘲談諧未嘗立尺寸而人信君爲正人葢君勇於義厚於仁敏於才而不務於外內實充然故其驗於人能爲人所不能如此君少嘗有宦志巳遷延不出今盛氣雖往猶時拊髀有慷􅁣之意設以君之才而施之於用其必有可觀者矣余之得交於君由其子學於余君爲子擇師隆而禮之甚至而與余尤相得爲昆弟交愧余之無能益於君也然余游新安前後六七年信而與之游者金君蔭陶君之從祖鄂堂及君三人而已三人者余皆無所益焉而其懃懃於余者皆無已此豈所可得於勢利之途者邪於是君五十之辰金君首爲詩以壽之鄂堂繼作能文之士從而和之者益多焉故述余之所重於君者而序之至於祝頌之語介福之辭非余所宜陳於君也關東紀程余以四月甲午出山海關踰歡喜嶺道㫄登望夫山山有孟姜女祠有明人碑云姜女許氏夫曰范植七郞秦人姜女登此山哭其夫而崩城遂投海死海湧石爲其墓去山八九里望見之云東行至老軍屯涉九江口是爲急水河入海之處海在其南五六里過明中前所城陟長嶺至於高嶺宿高嶺驛乙未涉石子河過明前屯衞廢城城在河東至葉家墳屯食食巳涉葉家墳河河在屯東又東涉東沙河沙河驛在河東過中後所城寕遠州巡檢所治也六州河在城東涉之踰鮑官嶺嶺長十餘里涉東關河河自北來分爲二而合於南東關驛在兩河閒又東宿三里橋丙申涉淵台河踰亂石山食寕遠州城南女見河在城南湯河在城東皆涉之女見河湯河合於州城之南是爲寕遠河南入海三十里三首山在寕遠城東踰之宿五里河在山上丁酉至連山驛食高橋鋪踰杏山至於松山兩山相墠間十八里地正平太宗皇帝破明兵擒􅇝承疇處也涉水凌河宿雙楊店在紫荆山南麓東北去錦州二十里戊戌涉大凌河食秃老婆店踰十三站嶺十三山之支也踰黃山東至閭陽驛醫無閭山在其北南沙河在其西涉之又涉楊郞河宿長興店東北去廣寕縣三十里自此東有二道其北道經廣寕縣城少回遠南道出其南己亥由南道行過北鎭堡城食中安鋪西北去廣寕縣三十里涉羊腸河所謂潞河也至小黑山驛小黑山在其北宿十里埂子庚子踰家窩蓬山自北道來者會於此食二道井子宿大白旗堡辛丑食新民屯屯有巡檢居之過巨流河城東渡巨流河巨流河者遼河也亦名句驪河以高句驪名或曰枸桺曰巨流聲之譌也至老邊城宿壬寅乘永安橋涉塔灣河入奉天府西關自奉天府西關至永安橋三十里自橋至巨流河六十里是爲奉天府承德縣境自巨流河至城五里自城至新民屯五十里自屯至白旗堡五十里自堡至羊腸河一百八里自羊腸河至楊郞河六十五里自楊桺河至南沙河十二里是爲錦州府廣寕縣境自南沙河至大凌河七十八里自大凌河至小凌河三十二里自小凌河至松山十八里自松山至連山驛七十六里又東十里自爲錦縣境自錦縣境至寕遠州二十二里自州至東關驛六十三里自驛至中後所城二十里自中後所至沙河驛十里自沙河驛至前屯衞廢城四十里自前屯衞城至中前所城四十里高嶺驛居其中自中前所城至九江口十五里自九江口至山海關三十里不至關十里爲寕遠州境與永平府臨渝縣界焉自關以東至小凌河其山皆出萬松山萬松山在關之北今謂之松嶺山以松嶺邊門名之邊者編桺爲藩起於萬松山東至義州鐵嶺開原以與蒙古界自開原南轉窮於鳳凰城屬之海奉天將軍與吉林將軍所轄分焉松嶺山東行二三百里其支南行多屬於海水皆東南流入海石子河六州河淵台河自邊外來然皆萬松山出也而東關驛河散流不達於海小凌河大凌河出邊外當萬松山之盡皆東南流入海自大凌河以西至於遼河其山皆出醫無閭其支南行不能屬於海南沙河楊郞河皆出焉東南流入海而羊腸河自邊外白雲山來亦醫無閭山支也散漫流不達於海故自南沙河以東沮洳洼下道泥中行雨則行水中史稱唐太宗渡遼泥淖三百餘里遣長孫無忌將萬人翦草塡道水深處以車爲梁而渡志稱潞河之濱百餘里泥濘往往行旅斷絕不虛也遼河莫知其源自遼以東山出長白而盡於府東水皆西流入於遼刑部司獄韓君家傳韓君士純字學醇別號澹齋徽州之黟人也其父賈武進君從至武進學於宜興吾崑吳生吳生死率其門人以吳生之行請於督學使者表其墓君學吳生十餘年溫然進退有君子之容其內行修謹善爲制舉文以國子監生應試於鄕屢不得舉父年且老矣遂不求仕治家產生業以資入授職刑部司獄年八十卒自其始適武進也年十餘歲而其母在黟他日疾君聞之泣涕請於父歸省時冬甚寒徒步行山中相識者道呼之不聞也旣而母疾愈遂迎以來事親曲有禮意雖盛暑未嘗袒免於親之側父之傳家於君也有異母弟三人俱幼析其產爲四君延師儒以敎誨其弟恩誼甚至訖俱成立女弟適江氏早卒其夫娶於汪無子其後江卒汪寡居君迎汪於家待之如其弟鄕里稱之人有與君之父賈而負其資者後其子以償君曰若所負吾父不求償也今吾父死而吾是償是爲反吾父之義卒卻不受君子以君之德爲能成於事親已乾隆五十二年江南饑君捐貲助賑縣以名籍上巡撫旌之曰德被鄕邦初君之母四十無子禱於神夜夢有吿之曰某廟主爲若子需其職竣逾年生君及卒之歲夢至廟所閱烝豚醴葅飫之里中夜聞藉藉徽人聲言迓君俄而君卒而人皆曰君爲神張惠言曰余未識君邑人唐爲坤者士君子也述君之行稱其經德不回言語必信庶幾孔子所謂立其本者如其言亦裒矣其子某請傳於家譜故次其事焉陳長生傳余故居南郊德安里鄰有陳長生者與兄奉母以居無妻子有室一楹園地以畯計者十兄僂且病常給爨守舍而長生力治地種菜賣之得錢且爲人賃傭以充食長生爲人少言多笑卽有陵之大恚輒復笑卽已未嘗校其爲傭勤甚他傭所苦弗欲悉任長生長生皆爲之無怠主人善之或侈與􅀡則計其傭之數取之而反其餘笑曰此足矣固與之則又笑委之去及其於所儥􅀡皆然人謂長生癡也余幼時見嬉日過其門門前樹瓜瓠之屬夏秋之交編竹爲架垂垂然時見長生兄弟奉母坐其下手一盂飯蔬一盆且語且食長生或時時抗聲歌則格格笑母與兄皆笑其後予徙居城中歲時至舊廬恒過訪焉十餘年其母死鬻其園地之半以斂焉而葬於其室前家益貧兄病益甚長生晨則食其兄而出力作暮歸扶持之甚僃兄困意不當輒怒詈長生每徹旦比屋聞者咸不平而長生未嘗有言年餘兄死則又鬻其園地以斂而葬於母㫄數月長生亦死鄰人鬻其居以葬焉論曰孟子之言曰人性善如長生者其耳之所聞目之所見豈嘗知有禮義之說哉何其鞠躬君子也長生之事母與兄鄕之人知而善之然至其取舍退讓則謂之癡何哉余故述其事將以待考風俗者有取焉故儒林郞祝君墓誌銘江陰祝百十百五將以某年月日奉其府君之柩從葬於黃山之阡疏其事行請銘於惠言惠言故百十百五也久不敢辭君諱士模字體成別自號訒亭世浙之蘭谿人遷江陰當明代候選州同知諱邦基君曾祖也以州同知補河南祥符縣河工主簿諱錦君祖也生景洲例贈儒林郞是爲君考君幼習舉子業刻苦自厲屢試不得志家貧客游江南北山東河南隴陜閒所至佐其道府州縣爲治政皆理佐治高家堰淮安淸河東昌下河皆辦之君爲人嚴正可畏與之居雖習不敢不敬久必大信之其任人事顧義何如未嘗隨人意有所委曲嘗爲合肥令陳大中辦驛務君議自費二十金以上官以俸給大中許之他日中㫄語更咨君君正色曰向已言之矣大中大怍卒從君已而大中遷泗洲洲賑民粟以委君君別民之居遠者易粟以金幷兩月與之非憲令也大中大懼君曰官者所以便民若有所瞻狥非公所以任某也乃說而聽人以是服君亦以賢大中自君祖祥符君官河工明於治河利病稱爲能君世習其說益精出其餘佐人治有成績乃著安瀾集河防要覽五水原委凡五卷初楊文定公爲程朱之學君之考其彌甥也嘗受業焉學以小學近思錄爲宗常服誠敬和三言而君姑之夫夏先生宗瀾文定高第弟子也交君父子閒君更得從受楊先生遺學故君進退節槩一中禮度著有楊文定語錄先儒講論經書記錄凡若干卷君卒以乾隆五十八年九月二十二日年七十有四以國子監生受職州同知例授儒林郞夫人同縣蔡氏縣學生諱鋐之女生百十百五皆補府學生而百五廩膳焉女子子二人國子監生陽湖楊偉吉內閣中書無錫薛玉堂其壻也孫五人銘曰政於人已則鞠兮襲於行譽則襮兮曰有令子葬君於此世其穀兮茗柯文外編卷上景福宮賦代合聽則聖賦周生字說代無倦齋銘代富陽縣修志書吿代雁黃殘稿序代吳興施氏家譜序代贈楊子掞序代江寕戴氏祠堂壁記代高氏義冢記代康母孫太夫人六十壽序徐􅂤齋壽序
